<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ClassReward — Quản lý lớp học thông minh</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <link rel="stylesheet" href="assets/css/animations.css" />
        <style>
            #userInfo {
                display: none;
                align-items: center;
                gap: 10px;
            }
            #userInfo .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: #45e3c6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
            }
            #userInfo .user-name {
                font-weight: 600;
                font-size: 14px;
            }
            #userInfo .btn-logout {
                padding: 6px 14px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                border: 2px solid #e8e8e8;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
                transition: all 0.2s;
            }
            #userInfo .btn-logout:hover {
                border-color: #45e3c6;
                color: #3bc4a8;
            }
            .app-footer {
                padding: 16px 24px;
                border-top: 1px solid #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: #999;
                background: #fafafa;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg fixed-top" id="navbar">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <img
                        src="assets/images/logo.svg"
                        alt="ClassReward"
                        class="logo-img"
                    />
                </a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#home">Trang chủ</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#features">Tính năng</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html"
                                >Quản lý lớp học</a
                            >
                        </li>
                    </ul>
                    <div class="navbar-buttons">
                        <a
                            href="login.html"
                            class="btn btn-outline-primary me-3"
                            id="loginBtn"
                            >Đăng nhập</a
                        >
                        <div id="userInfo">
                            <div class="user-avatar" id="navAvatar">?</div>
                            <span class="user-name" id="navName"></span>
                            <button class="btn-logout" onclick="doLogout()">
                                Thoát
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <section class="hero-section" id="home">
            <div class="container">
                <div class="row align-items-center min-vh-100">
                    <div class="col-lg-6 hero-content">
                        <h1 class="hero-title">
                            Thưởng phạt dễ dàng.<br />Dạy thông minh hơn.
                        </h1>
                        <p class="hero-text">
                            Quản lý thưởng phạt, xếp hạng học sinh và báo cáo dễ
                            dàng từ mọi thiết bị. Thay đổi cách bạn quản lý lớp
                            học.
                        </p>
                        <div class="hero-buttons">
                            <a
                                href="dashboard.html"
                                class="btn btn-primary btn-lg ripple"
                                >Vào lớp học</a
                            >
                        </div>
                    </div>
                    <div class="col-lg-6 hero-visual">
                        <div class="hero-image-wrapper">
                            <img
                                src="people.webp"
                                alt="ClassReward"
                                class="hero-image"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <span>&copy; 2026 ClassReward. Đã đăng ký bản quyền.</span>
            <span>Tận tâm vì nhà giáo khắp nơi.</span>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="assets/js/main.js"></script>
        <script>
            (function () {
                const token = localStorage.getItem("token");
                const userStr = localStorage.getItem("user");
                if (token && userStr) {
                    const user = JSON.parse(userStr);
                    document.getElementById("loginBtn").style.display = "none";
                    document.getElementById("userInfo").style.display = "flex";
                    document.getElementById("navAvatar").textContent =
                        user.fullName.charAt(0).toUpperCase();
                    document.getElementById("navName").textContent =
                        user.fullName;
                }
            })();
            function doLogout() {
                localStorage.clear();
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
