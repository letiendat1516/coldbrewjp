<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ClassReward — Quản lý lớp học thông minh</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <link rel="stylesheet" href="assets/css/animations.css" />
        <style>
            /* Logo row - big standalone */
            .logo-bar {
                padding: 12px 0;
                border-bottom: 1px solid #e8e8e8;
                background: #fff;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1030;
            }
            .logo-bar .logo-img {
                height: 100px;
                width: auto;
            }

            /* Slim navbar below logo */
            .navbar-row {
                padding: 8px 0;
                background: rgba(250, 250, 250, 0.95);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid #e8e8e8;
                position: fixed;
                top: 124px;
                left: 0;
                right: 0;
                z-index: 1029;
            }
            .navbar-row .nav-link {
                font-size: 14px;
                font-weight: 500;
                color: #666;
                padding: 8px 16px;
                border-radius: 8px;
                text-decoration: none;
            }
            .navbar-row .nav-link:hover {
                color: #111;
                background: #f5f5f5;
            }
            .navbar-row .nav-link.active {
                color: #111;
                font-weight: 600;
                background: rgba(69, 227, 198, 0.12);
            }

            #userInfo {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #userInfo .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: #45e3c6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
            }
            #userInfo .user-name {
                font-weight: 600;
                font-size: 14px;
            }
            .btn-sm {
                padding: 6px 14px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                border: 2px solid #e8e8e8;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .btn-sm:hover {
                border-color: #45e3c6;
                color: #3bc4a8;
            }

            /* Push content below fixed headers */
            body {
                padding-top: 178px;
            }

            .app-footer {
                padding: 16px 24px;
                border-top: 1px solid #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: #999;
                background: #fafafa;
            }

            @media (max-width: 768px) {
                body {
                    padding-top: 150px;
                }
                .navbar-row {
                    top: 110px;
                }
            }
        </style>
    </head>
    <body>
        <!-- Logo -->
        <div class="logo-bar">
            <div
                class="container"
                style="display: flex; justify-content: center"
            >
                <a href="/"
                    ><img
                        src="assets/images/logo.svg"
                        alt="ClassReward"
                        class="logo-img"
                /></a>
            </div>
        </div>

        <!-- Navbar -->
        <div class="navbar-row">
            <div
                class="container"
                style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                "
            >
                <div style="display: flex; gap: 4px">
                    <a href="/" class="nav-link active">Trang chủ</a>
                    <a href="#features" class="nav-link">Tính năng</a>
                    <a href="dashboard.html" class="nav-link"
                        >Quản lý lớp học</a
                    >
                </div>
                <div>
                    <a href="login.html" class="btn-sm" id="loginBtn"
                        >Đăng nhập</a
                    >
                    <div id="userInfo">
                        <div class="user-avatar" id="navAvatar">?</div>
                        <span class="user-name" id="navName"></span>
                        <button class="btn-sm" onclick="doLogout()">
                            Thoát
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hero -->
        <section
            class="hero-section"
            id="home"
            style="
                min-height: calc(100vh - 178px);
                display: flex;
                align-items: center;
            "
        >
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-6 hero-content">
                        <h1 class="hero-title">
                            Thưởng phạt dễ dàng.<br />Dạy thông minh hơn.
                        </h1>
                        <p class="hero-text">
                            Quản lý thưởng phạt, xếp hạng học sinh và báo cáo dễ
                            dàng từ mọi thiết bị. Thay đổi cách bạn quản lý lớp
                            học.
                        </p>
                        <div class="hero-buttons">
                            <a
                                href="dashboard.html"
                                class="btn btn-primary btn-lg ripple"
                                >Vào lớp học</a
                            >
                        </div>
                    </div>
                    <div class="col-lg-6 hero-visual">
                        <div class="hero-image-wrapper">
                            <img
                                src="people.webp"
                                alt="ClassReward"
                                class="hero-image"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <span>&copy; 2026 ClassReward. Đã đăng ký bản quyền.</span>
            <span>Tận tâm vì nhà giáo khắp nơi.</span>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            !(function () {
                const t = localStorage.getItem("token"),
                    e = localStorage.getItem("user"),
                    o = document.getElementById("loginBtn"),
                    n = document.getElementById("userInfo");
                t && e
                    ? ((o.style.display = "none"),
                      (n.style.display = "flex"),
                      (document.getElementById("navAvatar").textContent =
                          JSON.parse(e).fullName.charAt(0).toUpperCase()),
                      (document.getElementById("navName").textContent =
                          JSON.parse(e).fullName))
                    : ((o.style.display = "inline-block"),
                      (n.style.display = "none"));
            })();
            function doLogout() {
                localStorage.clear();
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
