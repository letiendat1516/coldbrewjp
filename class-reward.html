<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ClassReward — Quản lý lớp học thông minh</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <link rel="stylesheet" href="assets/css/animations.css" />
        <style>
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1030;
                padding: 8px 0;
                background: rgba(250, 250, 250, 0.95);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid #e8e8e8;
            }
            .navbar .container {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .nav-links {
                display: flex;
                gap: 4px;
                margin-left: 24px;
            }
            .nav-links a {
                font-size: 14px;
                font-weight: 500;
                color: #666;
                padding: 8px 16px;
                border-radius: 8px;
                text-decoration: none;
            }
            .nav-links a:hover {
                color: #111;
                background: #f5f5f5;
            }
            .nav-right {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            #userInfo {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #userInfo .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: #45e3c6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
            }
            #userInfo .user-name {
                font-weight: 600;
                font-size: 14px;
            }
            .btn-sm {
                padding: 6px 14px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                border: 2px solid #e8e8e8;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .btn-sm:hover {
                border-color: #45e3c6;
                color: #3bc4a8;
            }
            /* Logo overflows navbar */
            .navbar-brand {
                margin-top: -46px;
                margin-bottom: -46px;
            }
            .navbar-brand img {
                height: 100px;
                width: auto;
                display: block;
            }
            body {
                padding-top: 56px;
            }
            .app-footer {
                padding: 16px 24px;
                border-top: 1px solid #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: #999;
                background: #fafafa;
            }
        </style>
    </head>
    <body>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="navbar-brand"
                    ><img src="assets/images/logo.svg" alt="ClassReward"
                /></a>
                <div class="nav-links">
                    <a href="#home">Trang chủ</a>
                    <a href="#features">Tính năng</a>
                    <a href="dashboard.html">Quản lý lớp học</a>
                </div>
                <div class="nav-right">
                    <a href="login.html" class="btn-sm" id="loginBtn"
                        >Đăng nhập</a
                    >
                    <div id="userInfo">
                        <div class="user-avatar" id="navAvatar">?</div>
                        <span class="user-name" id="navName"></span>
                        <button class="btn-sm" onclick="doLogout()">
                            Thoát
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <section
            class="hero-section"
            id="home"
            style="
                min-height: calc(100vh - 56px);
                display: flex;
                align-items: center;
            "
        >
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-6 hero-content">
                        <h1 class="hero-title">
                            Thưởng phạt dễ dàng.<br />Dạy thông minh hơn.
                        </h1>
                        <p class="hero-text">
                            Quản lý thưởng phạt, xếp hạng học sinh và báo cáo dễ
                            dàng từ mọi thiết bị. Thay đổi cách bạn quản lý lớp
                            học.
                        </p>
                        <div class="hero-buttons">
                            <a
                                href="dashboard.html"
                                class="btn btn-primary btn-lg ripple"
                                >Vào lớp học</a
                            >
                        </div>
                    </div>
                    <div class="col-lg-6 hero-visual">
                        <div class="hero-image-wrapper">
                            <img
                                src="people.webp"
                                alt="ClassReward"
                                class="hero-image"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <span>&copy; 2026 ClassReward. Đã đăng ký bản quyền.</span>
            <span>Tận tâm vì nhà giáo khắp nơi.</span>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            !(function () {
                const e = localStorage.getItem("token"),
                    t = localStorage.getItem("user"),
                    o = document.getElementById("loginBtn"),
                    n = document.getElementById("userInfo");
                e && t
                    ? ((o.style.display = "none"),
                      (n.style.display = "flex"),
                      (document.getElementById("navAvatar").textContent =
                          JSON.parse(t).fullName.charAt(0).toUpperCase()),
                      (document.getElementById("navName").textContent =
                          JSON.parse(t).fullName))
                    : ((o.style.display = "inline-block"),
                      (n.style.display = "none"));
            })();
            function doLogout() {
                localStorage.clear();
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
