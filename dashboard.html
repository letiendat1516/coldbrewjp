<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quản lý lớp học — ClassReward</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <style>
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1031;
                padding: 6px 0 !important;
                background: rgba(250, 250, 250, 0.95);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid #e8e8e8;
            }
            .navbar .container {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .nav-links {
                display: flex;
                gap: 4px;
                margin-left: 24px;
            }
            .nav-links a {
                font-size: 14px;
                font-weight: 500;
                color: #666;
                padding: 8px 16px;
                border-radius: 8px;
                text-decoration: none;
            }
            .nav-links a:hover {
                color: #111;
                background: #f5f5f5;
            }
            .nav-links a.active {
                color: #111;
                font-weight: 600;
                background: rgba(69, 227, 198, 0.12);
            }
            .navbar-brand {
                margin-top: -46px;
                margin-bottom: -46px;
            }
            .navbar-brand img {
                height: 100px;
                width: auto;
                display: block;
            }
            #userInfo {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #userInfo .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: #45e3c6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
            }
            #userInfo .user-name {
                font-weight: 600;
                font-size: 14px;
            }
            .btn-sm {
                padding: 6px 14px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                border: 2px solid #e8e8e8;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .btn-sm:hover {
                border-color: #45e3c6;
                color: #3bc4a8;
            }
            body {
                padding-top: 54px;
                font-family: "Inter", sans-serif;
                background: #fafafa;
                color: #111;
            }
            .container {
                max-width: 1100px;
                padding: 24px;
                margin: 0 auto;
            }
            .stats-row {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 16px;
                margin-bottom: 32px;
            }
            .stat-card {
                background: #fff;
                border-radius: 16px;
                padding: 20px 24px;
                border: 1px solid #e8e8e8;
            }
            .stat-card .label {
                font-size: 12px;
                color: #999;
                text-transform: uppercase;
            }
            .stat-card .value {
                font-size: 32px;
                font-weight: 800;
                margin-top: 4px;
            }
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 20px;
            }
            .section-title {
                font-size: 20px;
                font-weight: 700;
            }
            .class-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 16px;
            }
            .class-card {
                background: #fff;
                border-radius: 16px;
                padding: 24px;
                border: 1px solid #e8e8e8;
                cursor: pointer;
                transition: all 0.2s;
                display: block;
                text-decoration: none;
                color: inherit;
            }
            .class-card:hover {
                border-color: #45e3c6;
                box-shadow: 0 24px 64px rgba(0, 0, 0, 0.08);
                transform: translateY(-2px);
            }
            .class-card .class-name {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 6px;
            }
            .class-card .class-meta {
                font-size: 13px;
                color: #999;
                display: flex;
                gap: 16px;
            }
            .class-card .class-code {
                display: inline-block;
                background: #fafafa;
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                color: #666;
                margin-top: 12px;
            }
            .empty {
                text-align: center;
                padding: 48px 24px;
                color: #999;
            }
            .btn {
                padding: 10px 20px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
                border: none;
                font-family: "Inter", sans-serif;
            }
            .btn-accent {
                background: #45e3c6;
                color: #111;
            }
            .btn-outline {
                background: none;
                border: 2px solid #e8e8e8;
                color: #666;
            }
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                z-index: 200;
                display: none;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.show {
                display: flex;
            }
            .modal {
                background: #fff;
                border-radius: 16px;
                padding: 32px;
                width: 90%;
                max-width: 440px;
            }
            .modal h3 {
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 20px;
            }
            .form-group {
                margin-bottom: 16px;
            }
            .form-label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #666;
                margin-bottom: 6px;
            }
            .form-input {
                width: 100%;
                padding: 12px 14px;
                font-size: 15px;
                font-family: "Inter", sans-serif;
                color: #111;
                background: #fafafa;
                border: 2px solid #e8e8e8;
                border-radius: 8px;
                outline: none;
            }
            .form-input:focus {
                border-color: #45e3c6;
                background: #fff;
            }
            .spinner {
                width: 24px;
                height: 24px;
                border: 3px solid #e8e8e8;
                border-top-color: #45e3c6;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                margin: 40px auto;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .toast {
                position: fixed;
                top: 64px;
                right: 24px;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                z-index: 300;
                animation: slideIn 0.3s ease;
            }
            .toast-success {
                background: rgba(69, 227, 198, 0.1);
                color: #3bc4a8;
                border: 1px solid rgba(69, 227, 198, 0.2);
            }
            .toast-error {
                background: rgba(245, 87, 108, 0.1);
                color: #f5576c;
                border: 1px solid rgba(245, 87, 108, 0.2);
            }
            @keyframes slideIn {
                from {
                    transform: translateX(100px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            .app-footer {
                padding: 10px 24px;
                border-top: 1px solid #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: #999;
                background: #fafafa;
            }
        </style>
    </head>
    <body>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="navbar-brand"
                    ><img src="assets/images/logo.svg" alt="ClassReward"
                /></a>
                <div class="nav-links">
                    <a href="/">Trang chủ</a><a href="/#features">Tính năng</a
                    ><a href="dashboard.html" class="active">Quản lý lớp học</a>
                </div>
                <div id="userInfo">
                    <div class="user-avatar" id="navAvatar">?</div>
                    <span class="user-name" id="navName"></span
                    ><button class="btn-sm" onclick="doLogout()">Thoát</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div id="loading" style="text-align: center; padding: 60px 0">
                <div class="spinner"></div>
            </div>
            <div id="content" style="display: none"></div>
        </div>
        <footer class="app-footer">
            <span>&copy; 2026 ClassReward.</span
            ><span>Tận tâm vì nhà giáo.</span>
        </footer>

        <div class="modal-overlay" id="createClassModal">
            <div class="modal">
                <h3>Tạo lớp học mới</h3>
                <form id="createClassForm">
                    <div class="form-group">
                        <label class="form-label">Tên lớp</label
                        ><input
                            type="text"
                            id="className"
                            class="form-input"
                            placeholder="Toán 8A"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mô tả</label
                        ><input
                            type="text"
                            id="classDesc"
                            class="form-input"
                            placeholder="Mô tả"
                        />
                    </div>
                    <div style="display: flex; gap: 16px; margin-bottom: 16px">
                        <div class="form-group" style="flex: 1">
                            <label class="form-label">Năm học</label
                            ><input
                                type="text"
                                id="schoolYear"
                                class="form-input"
                                placeholder="2026-2027"
                            />
                        </div>
                        <div class="form-group" style="flex: 1">
                            <label class="form-label">Học kỳ</label
                            ><select id="semester" class="form-input">
                                <option value="">--</option>
                                <option value="1">Kỳ 1</option>
                                <option value="2">Kỳ 2</option>
                            </select>
                        </div>
                    </div>
                    <div
                        id="modalError"
                        style="
                            color: #f5576c;
                            font-size: 13px;
                            margin-bottom: 12px;
                            display: none;
                        "
                    ></div>
                    <button
                        type="submit"
                        class="btn btn-accent"
                        style="width: 100%; padding: 12px"
                    >
                        Tạo lớp
                    </button>
                    <button
                        type="button"
                        class="btn btn-outline"
                        style="width: 100%; margin-top: 8px; padding: 12px"
                        onclick="closeModal()"
                    >
                        Hủy
                    </button>
                </form>
            </div>
        </div>
        <div class="modal-overlay" id="joinClassModal">
            <div class="modal">
                <h3>Tham gia lớp học</h3>
                <form id="joinClassForm">
                    <div class="form-group">
                        <label class="form-label">Mã lớp</label
                        ><input
                            type="text"
                            id="joinCode"
                            class="form-input"
                            placeholder="Nhập mã lớp"
                            required
                            style="text-transform: uppercase"
                        />
                    </div>
                    <div
                        id="joinError"
                        style="
                            color: #f5576c;
                            font-size: 13px;
                            margin-bottom: 12px;
                            display: none;
                        "
                    ></div>
                    <button
                        type="submit"
                        class="btn btn-accent"
                        style="width: 100%; padding: 12px"
                    >
                        Tham gia
                    </button>
                    <button
                        type="button"
                        class="btn btn-outline"
                        style="width: 100%; margin-top: 8px; padding: 12px"
                        onclick="closeModal()"
                    >
                        Hủy
                    </button>
                </form>
            </div>
        </div>

        <script>
            const API = "/api",
                token = localStorage.getItem("token"),
                user = JSON.parse(localStorage.getItem("user") || "{}"),
                isTeacher = user.role === "TEACHER" || user.role === "ADMIN";
            !(function () {
                if (!token) {
                    location.href = "login.html";
                    return;
                }
                document.getElementById("navAvatar").textContent = user.fullName
                    .charAt(0)
                    .toUpperCase();
                document.getElementById("navName").textContent = user.fullName;
                load();
            })();
            async function load() {
                try {
                    const e = await fetch(API + "/classes", {
                            headers: { Authorization: "Bearer " + token },
                        }),
                        t = await e.json();
                    if (!t.success) throw 0;
                    const a = t.data,
                        n = a.reduce((e, t) => e + (t._count?.members || 0), 0);
                    document.getElementById("loading").style.display = "none";
                    let s = document.getElementById("content");
                    s.style.display = "block";
                    let o = `<div class="stats-row"><div class="stat-card"><div class="label">Lớp học</div><div class="value">${a.length}</div></div><div class="stat-card"><div class="label">Học sinh</div><div class="value">${n}</div></div><div class="stat-card"><div class="label">Thao tác nhanh</div>${isTeacher ? '<button class="btn btn-accent" style="margin-top:8px;" onclick="openCreate()">+ Tạo lớp mới</button>' : '<button class="btn btn-accent" style="margin-top:8px;" onclick="openJoin()">+ Tham gia lớp</button>'}</div></div>`;
                    o += `<div class="section-header"><h2 class="section-title">${isTeacher ? "Lớp của tôi" : "Lớp đã tham gia"}</h2></div>`;
                    if (0 === a.length)
                        o += `<div class="empty"><p>${isTeacher ? "Chưa có lớp nào." : "Chưa tham gia lớp nào."}</p>${isTeacher ? '<button class="btn btn-accent" onclick="openCreate()">Tạo lớp đầu tiên</button>' : '<button class="btn btn-accent" onclick="openJoin()">Tham gia ngay</button>'}</div>`;
                    else {
                        o += '<div class="class-grid">';
                        for (const e of a)
                            o += `<a href="class.html?id=${e.id}" class="class-card"><div class="class-name">${esc(e.className)}</div><div class="class-meta"><span>${e.schoolYear || "—"} · HK${e.semester || "—"}</span><span>${e._count?.members || 0} học sinh</span></div><div class="class-code">Mã: ${esc(e.joinCode)}</div></a>`;
                        o += "</div>";
                    }
                    s.innerHTML = o;
                } catch (e) {
                    ((document.getElementById("loading").style.display =
                        "none"),
                        (document.getElementById("content").style.display =
                            "block"),
                        (document.getElementById("content").innerHTML =
                            '<div class="empty"><p>Lỗi tải dữ liệu.</p></div>'));
                }
            }
            function esc(e) {
                const t = document.createElement("div");
                return ((t.textContent = e), t.innerHTML);
            }
            function openCreate() {
                document
                    .getElementById("createClassModal")
                    .classList.add("show");
            }
            function openJoin() {
                document.getElementById("joinClassModal").classList.add("show");
            }
            function closeModal() {
                document
                    .querySelectorAll(".modal-overlay")
                    .forEach((e) => e.classList.remove("show"));
            }
            document
                .getElementById("createClassForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    try {
                        const e = await fetch(API + "/classes", {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    Authorization: "Bearer " + token,
                                },
                                body: JSON.stringify({
                                    className: document
                                        .getElementById("className")
                                        .value.trim(),
                                    description:
                                        document.getElementById("classDesc")
                                            .value,
                                    schoolYear:
                                        document.getElementById("schoolYear")
                                            .value,
                                    semester:
                                        document.getElementById("semester")
                                            .value || null,
                                }),
                            }),
                            t = await e.json();
                        t.success
                            ? (closeModal(),
                              load(),
                              toast("Tạo lớp thành công!", "success"))
                            : ((document.getElementById(
                                  "modalError",
                              ).textContent = t.message),
                              (document.getElementById(
                                  "modalError",
                              ).style.display = "block"));
                    } catch (e) {
                        ((document.getElementById("modalError").textContent =
                            "Lỗi"),
                            (document.getElementById(
                                "modalError",
                            ).style.display = "block"));
                    }
                });
            document
                .getElementById("joinClassForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    try {
                        const e = await fetch(API + "/classes/join", {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    Authorization: "Bearer " + token,
                                },
                                body: JSON.stringify({
                                    joinCode: document
                                        .getElementById("joinCode")
                                        .value.trim()
                                        .toUpperCase(),
                                }),
                            }),
                            t = await e.json();
                        t.success
                            ? (closeModal(),
                              load(),
                              toast("Tham gia thành công!", "success"))
                            : ((document.getElementById(
                                  "joinError",
                              ).textContent = t.message),
                              (document.getElementById(
                                  "joinError",
                              ).style.display = "block"));
                    } catch (e) {
                        ((document.getElementById("joinError").textContent =
                            "Lỗi"),
                            (document.getElementById(
                                "joinError",
                            ).style.display = "block"));
                    }
                });
            function toast(e, t) {
                const a = document.createElement("div");
                ((a.className = "toast toast-" + t),
                    (a.textContent = e),
                    document.body.appendChild(a),
                    setTimeout(() => a.remove(), 3e3));
            }
            function doLogout() {
                localStorage.clear();
                location.href = "login.html";
            }
        </script>
    </body>
</html>
