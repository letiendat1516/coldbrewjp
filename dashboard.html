<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quản lý lớp học — ClassReward</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <style>
            #userInfo {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #userInfo .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: #45e3c6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
            }
            #userInfo .user-name {
                font-weight: 600;
                font-size: 14px;
            }
            .btn-logout {
                padding: 6px 14px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                border: 2px solid #e8e8e8;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .btn-logout:hover {
                border-color: #45e3c6;
                color: #3bc4a8;
            }
            .container {
                max-width: 1100px;
                padding: 24px;
                margin: 0 auto;
            }
            .stats-row {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 16px;
                margin-bottom: 32px;
            }
            .stat-card {
                background: #fff;
                border-radius: 16px;
                padding: 20px 24px;
                border: 1px solid #e8e8e8;
            }
            .stat-card .label {
                font-size: 12px;
                color: #999;
                font-weight: 500;
                text-transform: uppercase;
            }
            .stat-card .value {
                font-size: 32px;
                font-weight: 800;
                margin-top: 4px;
            }
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 20px;
            }
            .section-title {
                font-size: 20px;
                font-weight: 700;
            }
            .class-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 16px;
            }
            .class-card {
                background: #fff;
                border-radius: 16px;
                padding: 24px;
                border: 1px solid #e8e8e8;
                cursor: pointer;
                transition: all 0.2s;
                display: block;
                text-decoration: none;
                color: inherit;
            }
            .class-card:hover {
                border-color: #45e3c6;
                box-shadow: 0 24px 64px rgba(0, 0, 0, 0.08);
                transform: translateY(-2px);
            }
            .class-card .class-name {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 6px;
            }
            .class-card .class-meta {
                font-size: 13px;
                color: #999;
                display: flex;
                gap: 16px;
            }
            .class-card .class-code {
                display: inline-block;
                background: #fafafa;
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                color: #666;
                margin-top: 12px;
            }
            .empty {
                text-align: center;
                padding: 48px 24px;
                color: #999;
            }
            .btn {
                padding: 10px 20px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
                border: none;
                font-family: "Inter", sans-serif;
            }
            .btn-accent {
                background: #45e3c6;
                color: #111;
            }
            .btn-outline {
                background: none;
                border: 2px solid #e8e8e8;
                color: #666;
            }
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                z-index: 200;
                display: none;
                align-items: center;
                justify-content: center;
            }
            .modal-overlay.show {
                display: flex;
            }
            .modal {
                background: #fff;
                border-radius: 16px;
                padding: 32px;
                width: 90%;
                max-width: 440px;
            }
            .modal h3 {
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 20px;
            }
            .form-group {
                margin-bottom: 16px;
            }
            .form-label {
                display: block;
                font-size: 13px;
                font-weight: 600;
                color: #666;
                margin-bottom: 6px;
            }
            .form-input {
                width: 100%;
                padding: 12px 14px;
                font-size: 15px;
                font-family: "Inter", sans-serif;
                color: #111;
                background: #fafafa;
                border: 2px solid #e8e8e8;
                border-radius: 8px;
                outline: none;
            }
            .form-input:focus {
                border-color: #45e3c6;
                background: #fff;
            }
            .spinner {
                width: 24px;
                height: 24px;
                border: 3px solid #e8e8e8;
                border-top-color: #45e3c6;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                margin: 40px auto;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .toast {
                position: fixed;
                top: 80px;
                right: 24px;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                z-index: 300;
                animation: slideIn 0.3s ease;
            }
            .toast-success {
                background: rgba(69, 227, 198, 0.1);
                color: #3bc4a8;
                border: 1px solid rgba(69, 227, 198, 0.2);
            }
            .toast-error {
                background: rgba(245, 87, 108, 0.1);
                color: #f5576c;
                border: 1px solid rgba(245, 87, 108, 0.2);
            }
            @keyframes slideIn {
                from {
                    transform: translateX(100px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            .app-footer {
                padding: 16px 24px;
                border-top: 1px solid #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: #999;
                background: #fafafa;
                margin-top: 40px;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg fixed-top" id="navbar">
            <div class="container">
                <a class="navbar-brand" href="/"
                    ><img
                        src="assets/images/logo.svg"
                        alt="ClassReward"
                        class="logo-img"
                /></a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/">Trang chủ</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/#features">Tính năng</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html"
                                >Quản lý lớp học</a
                            >
                        </li>
                    </ul>
                    <div class="navbar-buttons">
                        <div id="userInfo">
                            <div class="user-avatar" id="navAvatar">?</div>
                            <span class="user-name" id="navName"></span>
                            <button class="btn-logout" onclick="doLogout()">
                                Thoát
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container" style="padding-top: 120px">
            <div id="loading" style="text-align: center; padding: 80px 0">
                <div class="spinner"></div>
            </div>
            <div id="content" style="display: none"></div>
        </div>

        <footer class="app-footer">
            <span>&copy; 2026 ClassReward. Đã đăng ký bản quyền.</span>
            <span>Tận tâm vì nhà giáo khắp nơi.</span>
        </footer>

        <div class="modal-overlay" id="createClassModal">
            <div class="modal">
                <h3>Tạo lớp học mới</h3>
                <form id="createClassForm">
                    <div class="form-group">
                        <label class="form-label">Tên lớp</label
                        ><input
                            type="text"
                            id="className"
                            class="form-input"
                            placeholder="Ví dụ: Toán 8A"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mô tả</label
                        ><input
                            type="text"
                            id="classDesc"
                            class="form-input"
                            placeholder="Mô tả ngắn"
                        />
                    </div>
                    <div style="display: flex; gap: 16px; margin-bottom: 16px">
                        <div class="form-group" style="flex: 1">
                            <label class="form-label">Năm học</label
                            ><input
                                type="text"
                                id="schoolYear"
                                class="form-input"
                                placeholder="2026-2027"
                            />
                        </div>
                        <div class="form-group" style="flex: 1">
                            <label class="form-label">Học kỳ</label
                            ><select id="semester" class="form-input">
                                <option value="">--</option>
                                <option value="1">Kỳ 1</option>
                                <option value="2">Kỳ 2</option>
                            </select>
                        </div>
                    </div>
                    <div
                        id="modalError"
                        style="
                            color: #f5576c;
                            font-size: 13px;
                            margin-bottom: 12px;
                            display: none;
                        "
                    ></div>
                    <button
                        type="submit"
                        class="btn btn-accent"
                        style="width: 100%; padding: 12px; font-size: 15px"
                    >
                        Tạo lớp
                    </button>
                    <button
                        type="button"
                        class="btn btn-outline"
                        style="width: 100%; margin-top: 8px; padding: 12px"
                        onclick="closeModal()"
                    >
                        Hủy
                    </button>
                </form>
            </div>
        </div>
        <div class="modal-overlay" id="joinClassModal">
            <div class="modal">
                <h3>Tham gia lớp học</h3>
                <form id="joinClassForm">
                    <div class="form-group">
                        <label class="form-label">Mã lớp</label
                        ><input
                            type="text"
                            id="joinCode"
                            class="form-input"
                            placeholder="Nhập mã lớp"
                            required
                            style="text-transform: uppercase"
                        />
                    </div>
                    <div
                        id="joinError"
                        style="
                            color: #f5576c;
                            font-size: 13px;
                            margin-bottom: 12px;
                            display: none;
                        "
                    ></div>
                    <button
                        type="submit"
                        class="btn btn-accent"
                        style="width: 100%; padding: 12px; font-size: 15px"
                    >
                        Tham gia
                    </button>
                    <button
                        type="button"
                        class="btn btn-outline"
                        style="width: 100%; margin-top: 8px; padding: 12px"
                        onclick="closeModal()"
                    >
                        Hủy
                    </button>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="assets/js/main.js"></script>
        <script>
            const API = "/api";
            const token = localStorage.getItem("token");
            const user = JSON.parse(localStorage.getItem("user") || "{}");
            const isTeacher = user.role === "TEACHER" || user.role === "ADMIN";
            (function init() {
                if (!token) {
                    window.location.href = "login.html";
                    return;
                }
                document.getElementById("navAvatar").textContent = user.fullName
                    .charAt(0)
                    .toUpperCase();
                document.getElementById("navName").textContent = user.fullName;
                loadDashboard();
            })();
            async function loadDashboard() {
                try {
                    const res = await fetch(API + "/classes", {
                        headers: { Authorization: "Bearer " + token },
                    });
                    const data = await res.json();
                    if (!data.success) throw new Error(data.message);
                    const classes = data.data;
                    document.getElementById("loading").style.display = "none";
                    const content = document.getElementById("content");
                    content.style.display = "block";
                    const totalStudents = classes.reduce(
                        (s, c) => s + (c._count?.members || 0),
                        0,
                    );
                    let html = `<div class="stats-row"><div class="stat-card"><div class="label">Lớp học</div><div class="value">${classes.length}</div></div><div class="stat-card"><div class="label">Học sinh</div><div class="value">${totalStudents}</div></div><div class="stat-card"><div class="label">Thao tác nhanh</div>${isTeacher ? '<button class="btn btn-accent" style="margin-top:8px;" onclick="openCreateClass()">+ Tạo lớp mới</button>' : '<button class="btn btn-accent" style="margin-top:8px;" onclick="openJoinClass()">+ Tham gia lớp</button>'}</div></div>`;
                    html += `<div class="section-header"><h2 class="section-title">${isTeacher ? "Lớp của tôi" : "Lớp đã tham gia"}</h2></div>`;
                    if (classes.length === 0) {
                        html += `<div class="empty"><p>${isTeacher ? "Bạn chưa có lớp học nào." : "Bạn chưa tham gia lớp nào."}</p>${isTeacher ? '<button class="btn btn-accent" onclick="openCreateClass()">Tạo lớp đầu tiên</button>' : '<button class="btn btn-accent" onclick="openJoinClass()">Tham gia lớp ngay</button>'}</div>`;
                    } else {
                        html += '<div class="class-grid">';
                        for (const c of classes)
                            html += `<a href="class.html?id=${c.id}" class="class-card"><div class="class-name">${esc(c.className)}</div><div class="class-meta"><span>${c.schoolYear || "—"} · HK${c.semester || "—"}</span><span>${c._count?.members || 0} học sinh</span></div><div class="class-code">Mã: ${esc(c.joinCode)}</div></a>`;
                        html += "</div>";
                    }
                    content.innerHTML = html;
                } catch (e) {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("content").style.display = "block";
                    document.getElementById("content").innerHTML =
                        '<div class="empty"><p>Lỗi tải dữ liệu.</p></div>';
                }
            }
            function esc(s) {
                const d = document.createElement("div");
                d.textContent = s;
                return d.innerHTML;
            }
            function openCreateClass() {
                document
                    .getElementById("createClassModal")
                    .classList.add("show");
            }
            function openJoinClass() {
                document.getElementById("joinClassModal").classList.add("show");
            }
            function closeModal() {
                document
                    .querySelectorAll(".modal-overlay")
                    .forEach((m) => m.classList.remove("show"));
            }
            document
                .getElementById("createClassForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    try {
                        const res = await fetch(API + "/classes", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                Authorization: "Bearer " + token,
                            },
                            body: JSON.stringify({
                                className: document
                                    .getElementById("className")
                                    .value.trim(),
                                description:
                                    document.getElementById("classDesc").value,
                                schoolYear:
                                    document.getElementById("schoolYear").value,
                                semester:
                                    document.getElementById("semester").value ||
                                    null,
                            }),
                        });
                        const data = await res.json();
                        if (data.success) {
                            closeModal();
                            loadDashboard();
                            toast("Tạo lớp thành công!", "success");
                        } else {
                            document.getElementById("modalError").textContent =
                                data.message;
                            document.getElementById(
                                "modalError",
                            ).style.display = "block";
                        }
                    } catch (err) {
                        document.getElementById("modalError").textContent =
                            "Lỗi kết nối";
                        document.getElementById("modalError").style.display =
                            "block";
                    }
                });
            document
                .getElementById("joinClassForm")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();
                    try {
                        const res = await fetch(API + "/classes/join", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                Authorization: "Bearer " + token,
                            },
                            body: JSON.stringify({
                                joinCode: document
                                    .getElementById("joinCode")
                                    .value.trim()
                                    .toUpperCase(),
                            }),
                        });
                        const data = await res.json();
                        if (data.success) {
                            closeModal();
                            loadDashboard();
                            toast("Tham gia lớp thành công!", "success");
                        } else {
                            document.getElementById("joinError").textContent =
                                data.message;
                            document.getElementById("joinError").style.display =
                                "block";
                        }
                    } catch (err) {
                        document.getElementById("joinError").textContent =
                            "Lỗi kết nối";
                        document.getElementById("joinError").style.display =
                            "block";
                    }
                });
            function toast(msg, type) {
                const el = document.createElement("div");
                el.className = "toast toast-" + type;
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }
            function doLogout() {
                localStorage.clear();
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
