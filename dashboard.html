<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bảng tin — ClassReward</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #fafafa; --text: #111; --text2: #666; --text3: #999;
            --accent: #45e3c6; --accent2: #3bc4a8; --white: #fff; --border: #e8e8e8;
            --red: #f5576c; --orange: #FF9800; --blue: #667eea;
            --radius: 16px; --radius-sm: 8px;
            --shadow: 0 24px 64px rgba(0,0,0,0.08);
            --font: "Inter", sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; }

        /* Navbar */
        .navbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .nav-logo { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px; }
        .nav-logo img { height: 32px; }
        .nav-user { display: flex; align-items: center; gap: 16px; }
        .nav-user .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
        .nav-user .name { font-weight: 600; font-size: 14px; }
        .btn-sm { padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; font-size: 13px; cursor: pointer; border: none; font-family: var(--font); transition: all 0.2s; }
        .btn-outline { background: none; border: 2px solid var(--border); color: var(--text2); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent2); }
        .btn-accent { background: var(--accent); color: var(--text); font-weight: 700; }
        .btn-accent:hover { background: var(--accent2); }

        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--white); border-radius: var(--radius); padding: 20px 24px; border: 1px solid var(--border); }
        .stat-card .label { font-size: 12px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 32px; font-weight: 800; margin-top: 4px; letter-spacing: -0.02em; }
        .stat-card .sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
        .value.green { color: var(--accent2); }
        .value.red { color: var(--red); }

        /* Section Header */
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .section-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }

        /* Class Cards */
        .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .class-card { background: var(--white); border-radius: var(--radius); padding: 24px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; display: block; }
        .class-card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-2px); }
        .class-card .class-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .class-card .class-meta { font-size: 13px; color: var(--text3); display: flex; gap: 16px; }
        .class-card .class-code { display: inline-block; background: var(--bg); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text2); margin-top: 12px; }
        .class-card .class-stats { display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .class-card .stat-item { text-align: center; }
        .class-card .stat-val { font-size: 18px; font-weight: 700; }
        .class-card .stat-label { font-size: 11px; color: var(--text3); }

        /* Activity */
        .activity-list { display: flex; flex-direction: column; gap: 4px; }
        .activity-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--white); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .activity-emoji { font-size: 20px; width: 32px; text-align: center; }
        .activity-info { flex: 1; }
        .activity-info .title { font-size: 14px; font-weight: 600; }
        .activity-info .time { font-size: 12px; color: var(--text3); }
        .activity-point { font-weight: 700; font-size: 15px; }
        .activity-point.plus { color: var(--accent2); }
        .activity-point.minus { color: var(--red); }

        /* Empty state */
        .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
        .empty .icon { font-size: 48px; margin-bottom: 16px; }
        .empty p { font-size: 15px; margin-bottom: 20px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; display: none; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--white); border-radius: var(--radius); padding: 32px; width: 90%; max-width: 440px; }
        .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

        /* Spinner */
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { text-align: center; color: var(--text3); font-size: 14px; margin-top: 12px; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-teacher { background: rgba(69,227,198,0.15); color: var(--accent2); }
        .badge-student { background: rgba(102,126,234,0.12); color: var(--blue); }
        .badge-admin { background: rgba(245,87,108,0.1); color: var(--red); }

        .role-badge { margin-left: 8px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-logo">
            <img src="assets/images/logo.svg" alt="ClassReward" />
            ClassReward
        </a>
        <div class="nav-user">
            <span class="name" id="userName">...</span>
            <span class="role-badge" id="userBadge"></span>
            <div class="avatar" id="userAvatar">?</div>
            <button class="btn-sm btn-outline" onclick="logout()">Thoát</button>
        </div>
    </nav>

    <div class="container">
        <!-- Loading -->
        <div id="loading" style="text-align:center; padding: 80px 0;">
            <div class="spinner"></div>
            <div class="loading-text">Đang tải...</div>
        </div>

        <!-- Content -->
        <div id="content" style="display:none;"></div>
    </div>

    <!-- Create Class Modal -->
    <div class="modal-overlay" id="createClassModal">
        <div class="modal">
            <h3>Tạo lớp học mới</h3>
            <form id="createClassForm">
                <div class="form-group" style="margin-bottom:16px;">
                    <label class="form-label">Tên lớp</label>
                    <input type="text" id="className" class="form-input" placeholder="Ví dụ: Toán 8A" required />
                </div>
                <div class="form-group" style="margin-bottom:16px;">
                    <label class="form-label">Mô tả</label>
                    <input type="text" id="classDesc" class="form-input" placeholder="Mô tả ngắn về lớp học" />
                </div>
                <div style="display:flex; gap:16px; margin-bottom:16px;">
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">Năm học</label>
                        <input type="text" id="schoolYear" class="form-input" placeholder="2026-2027" />
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label class="form-label">Học kỳ</label>
                        <select id="semester" class="form-input"><option value="">--</option><option value="1">Kỳ 1</option><option value="2">Kỳ 2</option></select>
                    </div>
                </div>
                <div id="modalError" style="color:var(--red); font-size:13px; margin-bottom:12px; display:none;"></div>
                <button type="submit" class="btn-accent btn-sm" style="width:100%; padding:12px; font-size:15px;">Tạo lớp</button>
                <button type="button" class="btn-outline btn-sm" style="width:100%; margin-top:8px; padding:12px;" onclick="closeModal()">Hủy</button>
            </form>
        </div>
    </div>

    <!-- Join Class Modal -->
    <div class="modal-overlay" id="joinClassModal">
        <div class="modal">
            <h3>Tham gia lớp học</h3>
            <form id="joinClassForm">
                <div class="form-group" style="margin-bottom:16px;">
                    <label class="form-label">Mã lớp</label>
                    <input type="text" id="joinCode" class="form-input" placeholder="Nhập mã lớp (VD: ABC123)" required style="text-transform:uppercase;" />
                </div>
                <div id="joinError" style="color:var(--red); font-size:13px; margin-bottom:12px; display:none;"></div>
                <button type="submit" class="btn-accent btn-sm" style="width:100%; padding:12px; font-size:15px;">Tham gia</button>
                <button type="button" class="btn-outline btn-sm" style="width:100%; margin-top:8px; padding:12px;" onclick="closeModal()">Hủy</button>
            </form>
        </div>
    </div>

    <style>
        .form-input { width: 100%; padding: 12px 14px; font-size: 15px; font-family: var(--font); color: var(--text); background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm); outline: none; transition: all 0.2s; }
        .form-input:focus { border-color: var(--accent); background: var(--white); }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
        .toast { position: fixed; top: 80px; right: 24px; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; z-index: 300; animation: slideIn 0.3s ease; }
        .toast-error { background: rgba(245,87,108,0.1); color: var(--red); border: 1px solid rgba(245,87,108,0.2); }
        .toast-success { background: rgba(69,227,198,0.1); color: var(--accent2); border: 1px solid rgba(69,227,198,0.2); }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>

    <script>
        const API = '/api';
        let currentUser = null;

        // Init
        (async () => {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            if (!token || !userStr) { window.location.href = 'login.html'; return; }
            currentUser = JSON.parse(userStr);
            document.getElementById('userName').textContent = currentUser.fullName;
            document.getElementById('userAvatar').textContent = currentUser.fullName.charAt(0).toUpperCase();
            const badge = document.getElementById('userBadge');
            badge.className = 'badge badge-' + currentUser.role.toLowerCase();
            badge.textContent = currentUser.role === 'TEACHER' ? 'Giáo viên' : currentUser.role === 'STUDENT' ? 'Học sinh' : 'Quản trị';

            await loadDashboard();
        })();

        async function loadDashboard() {
            try {
                const res = await fetch(API + '/classes', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
                const data = await res.json();
                if (!data.success) throw new Error(data.message);

                const classes = data.data;
                document.getElementById('loading').style.display = 'none';
                const content = document.getElementById('content');
                content.style.display = 'block';

                const isTeacher = currentUser.role === 'TEACHER' || currentUser.role === 'ADMIN';

                // Stats
                const totalStudents = classes.reduce((s, c) => s + (c._count?.members || 0), 0);

                let html = `
                    <div class="stats-row">
                        <div class="stat-card">
                            <div class="label">Lớp học</div>
                            <div class="value">${classes.length}</div>
                        </div>
                        <div class="stat-card">
                            <div class="label">Học sinh</div>
                            <div class="value">${totalStudents}</div>
                        </div>
                        ${isTeacher ? `
                        <div class="stat-card">
                            <div class="label">Thao tác nhanh</div>
                            <button class="btn-accent btn-sm" style="margin-top:8px;" onclick="openCreateClass()">+ Tạo lớp mới</button>
                        </div>` : `
                        <div class="stat-card">
                            <div class="label">Thao tác nhanh</div>
                            <button class="btn-accent btn-sm" style="margin-top:8px;" onclick="openJoinClass()">+ Tham gia lớp</button>
                        </div>`}
                    </div>`;

                html += `<div class="section-header"><h2 class="section-title">${isTeacher ? 'Lớp của tôi' : 'Lớp đã tham gia'}</h2></div>`;

                if (classes.length === 0) {
                    html += `<div class="empty">
                        <div class="icon">${isTeacher ? '📚' : '🔍'}</div>
                        <p>${isTeacher ? 'Bạn chưa có lớp học nào.' : 'Bạn chưa tham gia lớp nào.'}</p>
                        ${isTeacher
                            ? '<button class="btn-accent btn-sm" onclick="openCreateClass()">Tạo lớp đầu tiên</button>'
                            : '<button class="btn-accent btn-sm" onclick="openJoinClass()">Tham gia lớp ngay</button>'}
                    </div>`;
                } else {
                    html += '<div class="class-grid">';
                    for (const c of classes) {
                        html += `
                        <a href="class.html?id=${c.id}" class="class-card">
                            <div class="class-name">${esc(c.className)}</div>
                            <div class="class-meta">
                                <span>${c.schoolYear || '—'} • HK${c.semester || '—'}</span>
                                <span>${c._count?.members || 0} học sinh</span>
                            </div>
                            <div class="class-code">Mã: ${esc(c.joinCode)}</div>
                            <div class="class-stats">
                                ${isTeacher ? `<div class="stat-item"><div class="stat-val">${esc(c.teacher?.fullName || '')}</div><div class="stat-label">Giáo viên</div></div>` : ''}
                                <div class="stat-item"><div class="stat-val">${c.status === 'ACTIVE' ? '🟢' : '⚫'}</div><div class="stat-label">${c.status === 'ACTIVE' ? 'Đang hoạt động' : 'Đã lưu trữ'}</div></div>
                            </div>
                        </a>`;
                    }
                    html += '</div>';
                }

                content.innerHTML = html;
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('content').innerHTML = '<div class="empty"><p>Không thể tải dữ liệu. <a href="javascript:loadDashboard()">Thử lại</a></p></div>';
            }
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function openCreateClass() { document.getElementById('createClassModal').classList.add('show'); document.getElementById('className').focus(); }
        function openJoinClass() { document.getElementById('joinClassModal').classList.add('show'); document.getElementById('joinCode').focus(); }
        function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show')); }

        document.getElementById('createClassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('className').value.trim();
            if (!name) return;
            try {
                const res = await fetch(API + '/classes', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: JSON.stringify({ className: name, description: document.getElementById('classDesc').value, schoolYear: document.getElementById('schoolYear').value, semester: document.getElementById('semester').value || null })
                });
                const data = await res.json();
                if (data.success) { closeModal(); loadDashboard(); toast('Tạo lớp thành công!', 'success'); }
                else { document.getElementById('modalError').textContent = data.message; document.getElementById('modalError').style.display = 'block'; }
            } catch (err) { document.getElementById('modalError').textContent = 'Lỗi kết nối'; document.getElementById('modalError').style.display = 'block'; }
        });

        document.getElementById('joinClassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (!code) return;
            try {
                const res = await fetch(API + '/classes/join', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: JSON.stringify({ joinCode: code })
                });
                const data = await res.json();
                if (data.success) { closeModal(); loadDashboard(); toast('Tham gia lớp thành công!', 'success'); }
                else { document.getElementById('joinError').textContent = data.message; document.getElementById('joinError').style.display = 'block'; }
            } catch (err) { document.getElementById('joinError').textContent = 'Lỗi kết nối'; document.getElementById('joinError').style.display = 'block'; }
        });

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
