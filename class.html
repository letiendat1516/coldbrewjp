<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chi tiết lớp — ClassReward</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <style>
            #userInfo {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #userInfo .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: #45e3c6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
            }
            #userInfo .user-name {
                font-weight: 600;
                font-size: 14px;
            }
            .btn-logout {
                padding: 6px 14px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                border: 2px solid #e8e8e8;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .btn-logout:hover {
                border-color: #45e3c6;
                color: #3bc4a8;
            }
            .container {
                max-width: 1100px;
                padding: 24px;
                margin: 0 auto;
            }
            .tabs {
                display: flex;
                gap: 4px;
                background: #fff;
                border-radius: 16px;
                padding: 4px;
                border: 1px solid #e8e8e8;
                margin-bottom: 24px;
            }
            .tab {
                flex: 1;
                padding: 12px;
                text-align: center;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
                border-radius: 12px;
                border: none;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .tab.active {
                background: #45e3c6;
                color: #111;
            }
            .rank-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .rank-item {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 16px 20px;
                background: #fff;
                border-radius: 16px;
                border: 1px solid #e8e8e8;
            }
            .rank-item.top1 {
                border-color: #ffd700;
                background: linear-gradient(135deg, #fffde7, #fff8e1);
            }
            .rank-item.top2 {
                border-color: #c0c0c0;
                background: linear-gradient(135deg, #fafafa, #f5f5f5);
            }
            .rank-item.top3 {
                border-color: #cd7f32;
                background: linear-gradient(135deg, #fff3e0, #ffecb3);
            }
            .rank-num {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 800;
                font-size: 16px;
                background: #fafafa;
            }
            .rank-item.top1 .rank-num {
                background: #ffd700;
                color: #fff;
            }
            .rank-item.top2 .rank-num {
                background: #c0c0c0;
                color: #fff;
            }
            .rank-item.top3 .rank-num {
                background: #cd7f32;
                color: #fff;
            }
            .rank-avatar {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 16px;
                color: #fff;
                flex-shrink: 0;
            }
            .rank-name {
                font-weight: 600;
                font-size: 15px;
                flex: 1;
            }
            .rank-points {
                display: flex;
                gap: 20px;
                font-size: 14px;
            }
            .rank-points .plus {
                color: #3bc4a8;
                font-weight: 700;
            }
            .rank-points .minus {
                color: #f5576c;
                font-weight: 700;
            }
            .rank-points .net {
                font-weight: 800;
                font-size: 16px;
                min-width: 50px;
                text-align: right;
            }
            .sticker-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 24px;
            }
            .sticker-btn {
                padding: 12px 18px;
                border-radius: 12px;
                border: 2px solid #e8e8e8;
                background: #fff;
                cursor: pointer;
                text-align: center;
                font-family: "Inter", sans-serif;
                min-width: 80px;
            }
            .sticker-btn:hover {
                transform: translateY(-2px);
            }
            .sticker-btn.reward {
                border-color: rgba(69, 227, 198, 0.3);
            }
            .sticker-btn.reward:hover {
                border-color: #45e3c6;
            }
            .sticker-btn.penalty {
                border-color: rgba(245, 87, 108, 0.3);
            }
            .sticker-btn.penalty:hover {
                border-color: #f5576c;
            }
            .sticker-btn .emoji {
                font-size: 28px;
                display: block;
                margin-bottom: 4px;
            }
            .sticker-btn .sname {
                font-size: 11px;
                font-weight: 600;
                color: #666;
            }
            .sticker-btn .spoint {
                font-size: 14px;
                font-weight: 800;
            }
            .member-list {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .member-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: #fff;
                border-radius: 8px;
                border: 1px solid #e8e8e8;
                cursor: pointer;
            }
            .member-item:hover {
                border-color: #45e3c6;
            }
            .member-item.selected {
                border-color: #45e3c6;
                background: rgba(69, 227, 198, 0.06);
            }
            .member-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 14px;
                color: #fff;
                flex-shrink: 0;
            }
            .member-info {
                flex: 1;
            }
            .member-name {
                font-weight: 600;
                font-size: 14px;
            }
            .member-email {
                font-size: 12px;
                color: #999;
            }
            .member-score {
                font-weight: 700;
                font-size: 16px;
            }
            .activity-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: #fff;
                border-radius: 8px;
                border: 1px solid #e8e8e8;
            }
            .activity-emoji {
                font-size: 20px;
                width: 32px;
                text-align: center;
            }
            .activity-info {
                flex: 1;
            }
            .activity-info .atitle {
                font-size: 14px;
                font-weight: 600;
            }
            .activity-info .atime {
                font-size: 12px;
                color: #999;
            }
            .activity-point {
                font-weight: 700;
                font-size: 15px;
            }
            .activity-point.plus {
                color: #3bc4a8;
            }
            .activity-point.minus {
                color: #f5576c;
            }
            .info-bar {
                display: flex;
                gap: 24px;
                flex-wrap: wrap;
                padding: 16px 20px;
                background: #fff;
                border: 1px solid #e8e8e8;
                border-radius: 16px;
                margin-bottom: 24px;
                font-size: 13px;
                color: #666;
            }
            .info-bar strong {
                color: #111;
            }
            .stats-row {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                margin-bottom: 20px;
            }
            .stat-card {
                background: #fff;
                border-radius: 16px;
                padding: 16px 20px;
                border: 1px solid #e8e8e8;
            }
            .stat-card .label {
                font-size: 12px;
                color: #999;
                text-transform: uppercase;
            }
            .stat-card .value {
                font-size: 28px;
                font-weight: 800;
                margin-top: 4px;
            }
            .value.green {
                color: #3bc4a8;
            }
            .value.red {
                color: #f5576c;
            }
            .section-title {
                font-size: 14px;
                font-weight: 700;
                margin-bottom: 12px;
                color: #666;
                text-transform: uppercase;
            }
            .empty {
                text-align: center;
                padding: 40px;
                color: #999;
            }
            .spinner {
                width: 24px;
                height: 24px;
                border: 3px solid #e8e8e8;
                border-top-color: #45e3c6;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                margin: 40px auto;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .toast {
                position: fixed;
                top: 80px;
                right: 24px;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                z-index: 300;
                animation: slideIn 0.3s ease;
            }
            .toast-success {
                background: rgba(69, 227, 198, 0.1);
                color: #3bc4a8;
                border: 1px solid rgba(69, 227, 198, 0.2);
            }
            .toast-error {
                background: rgba(245, 87, 108, 0.1);
                color: #f5576c;
                border: 1px solid rgba(245, 87, 108, 0.2);
            }
            @keyframes slideIn {
                from {
                    transform: translateX(100px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            .badge {
                padding: 3px 10px;
                border-radius: 12px;
                font-size: 11px;
                font-weight: 600;
            }
            .badge-green {
                background: rgba(69, 227, 198, 0.15);
                color: #3bc4a8;
            }
            .app-footer {
                padding: 16px 24px;
                border-top: 1px solid #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: #999;
                background: #fafafa;
                margin-top: 40px;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg fixed-top" id="navbar">
            <div class="container">
                <a class="navbar-brand" href="/"
                    ><img
                        src="assets/images/logo.svg"
                        alt="ClassReward"
                        class="logo-img"
                /></a>
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="/">Trang chủ</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/#features">Tính năng</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html"
                                >Quản lý lớp học</a
                            >
                        </li>
                    </ul>
                    <div class="navbar-buttons">
                        <div id="userInfo">
                            <div class="user-avatar" id="navAvatar">?</div>
                            <span class="user-name" id="navName"></span>
                            <button class="btn-logout" onclick="doLogout()">
                                Thoát
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container" style="padding-top: 120px">
            <div
                style="
                    display: flex;
                    align-items: center;
                    gap: 12px;
                    margin-bottom: 20px;
                "
            >
                <a
                    href="dashboard.html"
                    style="font-size: 20px; color: #999; text-decoration: none"
                    >←</a
                >
                <h2
                    style="font-size: 22px; font-weight: 800; margin: 0"
                    id="classTitle"
                >
                    Đang tải...
                </h2>
                <span class="badge badge-green" id="classCode"></span>
            </div>
            <div id="loading"><div class="spinner"></div></div>
            <div id="content" style="display: none"></div>
        </div>

        <footer class="app-footer">
            <span>&copy; 2026 ClassReward. Đã đăng ký bản quyền.</span>
            <span>Tận tâm vì nhà giáo khắp nơi.</span>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="assets/js/main.js"></script>
        <script>
            const API = "/api";
            const urlParams = new URLSearchParams(window.location.search);
            const classId = urlParams.get("id");
            if (!classId) {
                window.location.href = "dashboard.html";
            }
            const token = localStorage.getItem("token");
            const user = JSON.parse(localStorage.getItem("user") || "{}");
            const isTeacher = user.role === "TEACHER" || user.role === "ADMIN";
            let classData = null,
                stickers = [],
                selectedStudent = null,
                activeTab = "ranking";
            (function init() {
                if (!token) {
                    window.location.href = "login.html";
                    return;
                }
                document.getElementById("navAvatar").textContent = user.fullName
                    .charAt(0)
                    .toUpperCase();
                document.getElementById("navName").textContent = user.fullName;
                loadClassData();
            })();
            async function loadClassData() {
                try {
                    const [classRes, rankRes] = await Promise.all([
                        fetch(API + "/classes/" + classId, {
                            headers: { Authorization: "Bearer " + token },
                        }),
                        fetch(API + "/ranking/class/" + classId, {
                            headers: { Authorization: "Bearer " + token },
                        }),
                    ]);
                    const classJson = await classRes.json();
                    const rankJson = await rankRes.json();
                    if (!classJson.success) throw new Error("Not found");
                    classData = classJson.data;
                    stickers = [];
                    if (classData.stickerSets)
                        for (const m of classData.stickerSets)
                            if (m.stickerSet?.stickers)
                                stickers.push(...m.stickerSet.stickers);
                    document.getElementById("classTitle").textContent =
                        classData.className;
                    document.getElementById("classCode").textContent =
                        "Mã: " + classData.joinCode;
                    document.getElementById("loading").style.display = "none";
                    render(rankJson.data);
                } catch (e) {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("content").innerHTML =
                        '<div class="empty"><p>Không thể tải dữ liệu lớp.</p><a href="dashboard.html">← Quay lại</a></div>';
                }
            }
            function render(rankData) {
                const content = document.getElementById("content");
                content.style.display = "block";
                let html = `<div class="info-bar"><span>👨‍🏫 <strong>${esc(classData.teacher?.fullName || "—")}</strong></span><span>👥 <strong>${classData.members?.length || 0} học sinh</strong></span><span>📅 <strong>${classData.schoolYear || "—"} - HK${classData.semester || "—"}</strong></span></div>`;
                html += `<div class="tabs"><button class="tab ${activeTab === "ranking" ? "active" : ""}" onclick="switchTab('ranking')">🏆 Bảng xếp hạng</button>`;
                if (isTeacher)
                    html += `<button class="tab ${activeTab === "reward" ? "active" : ""}" onclick="switchTab('reward')">⭐ Thưởng / Phạt</button>`;
                html += `<button class="tab ${activeTab === "activity" ? "active" : ""}" onclick="switchTab('activity')">📋 Hoạt động</button><button class="tab ${activeTab === "members" ? "active" : ""}" onclick="switchTab('members')">👥 Thành viên</button></div>`;
                if (activeTab === "ranking") html += renderRanking(rankData);
                else if (activeTab === "reward") html += renderReward();
                else if (activeTab === "members")
                    html += renderMembers(rankData);
                else if (activeTab === "activity")
                    html +=
                        '<div id="activityList"><div class="spinner"></div></div>';
                content.innerHTML = html;
                if (activeTab === "activity") loadActivity();
            }
            function renderRanking(rankData) {
                const ranking = rankData?.ranking || [],
                    summary = rankData?.summary || {};
                if (ranking.length === 0)
                    return '<div class="empty"><p>Chưa có dữ liệu xếp hạng.</p></div>';
                let html = `<div class="stats-row"><div class="stat-card"><div class="label">Tổng thưởng</div><div class="value green">+${summary.totalRewardsGiven || 0}</div></div><div class="stat-card"><div class="label">Tổng phạt</div><div class="value red">-${summary.totalPenaltiesGiven || 0}</div></div><div class="stat-card"><div class="label">Lượt thao tác</div><div class="value">${summary.totalActions || 0}</div></div></div>`;
                html += '<div class="rank-list">';
                for (const r of ranking) {
                    const tc =
                        r.rank === 1
                            ? "top1"
                            : r.rank === 2
                              ? "top2"
                              : r.rank === 3
                                ? "top3"
                                : "";
                    html += `<div class="rank-item ${tc}"><div class="rank-num">${["", "🥇", "🥈", "🥉"][r.rank] || r.rank}</div><div class="rank-avatar" style="background:${rc(r.student.id)}">${r.student.fullName.charAt(0)}</div><div class="rank-name">${esc(r.student.fullName)}</div><div class="rank-points"><span class="plus">+${r.totalReward}</span><span class="minus">-${r.totalPenalty}</span><span class="net" style="color:${r.netPoints >= 0 ? "#3bc4a8" : "#f5576c"}">${r.netPoints >= 0 ? "+" : ""}${r.netPoints}</span></div></div>`;
                }
                return html + "</div>";
            }
            function renderReward() {
                if (classData.members.length === 0)
                    return '<div class="empty"><p>Chưa có học sinh trong lớp.</p></div>';
                const rewards = stickers.filter((s) => s.type === "REWARD"),
                    penalties = stickers.filter((s) => s.type === "PENALTY");
                let html = "";
                if (selectedStudent) {
                    const s = selectedStudent;
                    html += `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-radius:8px;border:1px solid #45e3c6;margin-bottom:16px;"><div class="member-avatar" style="background:${rc(s.id)}">${s.fullName.charAt(0)}</div><div style="flex:1;"><strong>${esc(s.fullName)}</strong><br><span style="font-size:12px;color:#999;">${esc(s.email)}</span></div><button style="color:#999;background:none;border:none;cursor:pointer;font-size:18px;" onclick="selectedStudent=null;switchTab('reward')">✕</button></div>`;
                } else
                    html +=
                        '<p style="color:#666;margin-bottom:12px;">Chọn học sinh bên dưới, sau đó chọn sticker.</p>';
                html +=
                    '<div class="section-title">Chọn học sinh</div><div class="member-list" style="margin-bottom:16px;max-height:200px;overflow-y:auto;">';
                for (const m of classData.members) {
                    const s = m.student;
                    html += `<div class="member-item ${selectedStudent?.id === s.id ? "selected" : ""}" onclick="selectStudent(${s.id})"><div class="member-avatar" style="background:${rc(s.id)}">${s.fullName.charAt(0)}</div><div class="member-info"><div class="member-name">${esc(s.fullName)}</div></div></div>`;
                }
                html += "</div>";
                if (stickers.length === 0)
                    return (
                        html +
                        '<div class="empty"><p>Chưa có sticker nào.</p></div>'
                    );
                if (rewards.length > 0) {
                    html +=
                        '<div class="section-title">⭐ Thưởng</div><div class="sticker-grid">';
                    for (const s of rewards)
                        html += `<button class="sticker-btn reward" onclick="giveSticker('${s.id}')"><span class="emoji">${s.emoji || "⭐"}</span><span class="sname">${esc(s.name)}</span><span class="spoint" style="color:#3bc4a8">+${s.point}</span></button>`;
                    html += "</div>";
                }
                if (penalties.length > 0) {
                    html +=
                        '<div class="section-title">⚠️ Phạt</div><div class="sticker-grid">';
                    for (const s of penalties)
                        html += `<button class="sticker-btn penalty" onclick="giveSticker('${s.id}')"><span class="emoji">${s.emoji || "⚠️"}</span><span class="sname">${esc(s.name)}</span><span class="spoint" style="color:#f5576c">${s.point}</span></button>`;
                    html += "</div>";
                }
                return html;
            }
            function renderMembers(rankData) {
                const ranking = rankData?.ranking || [],
                    rankMap = {};
                ranking.forEach((r) => {
                    rankMap[r.student.id] = r;
                });
                let html = '<div class="member-list">';
                for (const m of classData.members) {
                    const s = m.student,
                        r = rankMap[s.id];
                    html += `<div class="member-item"><div class="member-avatar" style="background:${rc(s.id)}">${s.fullName.charAt(0)}</div><div class="member-info"><div class="member-name">${esc(s.fullName)}</div><div class="member-email">${esc(s.email)}</div></div><div class="member-score" style="color:${(r?.netPoints || 0) >= 0 ? "#3bc4a8" : "#f5576c"}">${r ? (r.netPoints >= 0 ? "+" : "") + r.netPoints : "0"}</div></div>`;
                }
                return html + "</div>";
            }
            async function loadActivity() {
                try {
                    const res = await fetch(
                        API + "/rewards/class/" + classId + "?limit=30",
                        { headers: { Authorization: "Bearer " + token } },
                    );
                    const data = await res.json(),
                        logs = data.data?.logs || [];
                    let html =
                        '<div style="display:flex;flex-direction:column;gap:4px;">';
                    if (logs.length === 0)
                        html +=
                            '<div class="empty"><p>Chưa có hoạt động nào.</p></div>';
                    else
                        for (const l of logs)
                            html += `<div class="activity-item"><div class="activity-emoji">${l.sticker?.emoji || "📌"}</div><div class="activity-info"><div class="atitle">${esc(l.student?.fullName || "—")} — ${esc(l.sticker?.name || "—")}</div><div class="atime">${timeAgo(l.createdAt)} · bởi ${esc(l.teacher?.fullName || "—")}</div></div><div class="activity-point ${l.sticker?.type === "REWARD" ? "plus" : "minus"}">${l.sticker?.type === "REWARD" ? "+" : ""}${l.sticker?.point || 0}</div></div>`;
                    document.getElementById("activityList").innerHTML =
                        html + "</div>";
                } catch (e) {
                    document.getElementById("activityList").innerHTML =
                        '<div class="empty">Lỗi</div>';
                }
            }
            function selectStudent(id) {
                const m = classData.members.find((m) => m.student.id == id);
                if (m) selectedStudent = m.student;
                switchTab("reward");
            }
            async function giveSticker(stickerId) {
                if (!selectedStudent) {
                    toast("Chọn học sinh trước", "error");
                    return;
                }
                try {
                    const res = await fetch(API + "/rewards", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            Authorization: "Bearer " + token,
                        },
                        body: JSON.stringify({
                            classId,
                            studentId: selectedStudent.id.toString(),
                            stickerId,
                        }),
                    });
                    const data = await res.json();
                    if (data.success) {
                        const s = stickers.find((s) => s.id == stickerId);
                        toast(
                            `${s?.emoji || ""} ${s?.name || ""} → ${esc(selectedStudent.fullName)}`,
                            "success",
                        );
                        await loadClassData();
                    } else toast(data.message || "Lỗi", "error");
                } catch (e) {
                    toast("Lỗi kết nối", "error");
                }
            }
            function switchTab(tab) {
                activeTab = tab;
                if (tab !== "reward") selectedStudent = null;
                loadClassData();
            }
            function esc(s) {
                const d = document.createElement("div");
                d.textContent = s;
                return d.innerHTML;
            }
            function rc(id) {
                const c = [
                    "#45E3C6",
                    "#667EEA",
                    "#F5576C",
                    "#FF9800",
                    "#4CAF50",
                    "#9C27B0",
                    "#00BCD4",
                    "#FF5722",
                    "#3F51B5",
                ];
                return c[Number(BigInt(id) % BigInt(c.length))] || c[0];
            }
            function timeAgo(d) {
                const diff = Date.now() - new Date(d).getTime(),
                    m = Math.floor(diff / 60000);
                if (m < 1) return "Vừa xong";
                if (m < 60) return m + " phút trước";
                const h = Math.floor(m / 60);
                if (h < 24) return h + " giờ trước";
                return Math.floor(h / 24) + " ngày trước";
            }
            function toast(msg, type) {
                const el = document.createElement("div");
                el.className = "toast toast-" + type;
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }
            function doLogout() {
                localStorage.clear();
                window.location.href = "login.html";
            }
        </script>
    </body>
</html>
