<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chi tiết lớp — ClassReward</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
        <style>
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1031;
                padding: 6px 0 !important;
                background: rgba(250, 250, 250, 0.95);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid #e8e8e8;
            }
            .navbar .container {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .nav-links {
                display: flex;
                gap: 4px;
                margin-left: 24px;
            }
            .nav-links a {
                font-size: 14px;
                font-weight: 500;
                color: #666;
                padding: 8px 16px;
                border-radius: 8px;
                text-decoration: none;
            }
            .nav-links a:hover {
                color: #111;
                background: #f5f5f5;
            }
            .nav-links a.active {
                color: #111;
                font-weight: 600;
                background: rgba(69, 227, 198, 0.12);
            }
            .navbar-brand {
                margin-top: -46px;
                margin-bottom: -46px;
            }
            .navbar-brand img {
                height: 100px;
                width: auto;
                display: block;
            }
            #userInfo {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #userInfo .user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: #45e3c6;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
            }
            #userInfo .user-name {
                font-weight: 600;
                font-size: 14px;
            }
            .btn-sm {
                padding: 4px 12px;
                border-radius: 8px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                border: 2px solid #e8e8e8;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .btn-sm:hover {
                border-color: #45e3c6;
                color: #3bc4a8;
            }
            body {
                padding-top: 54px;
                font-family: "Inter", sans-serif;
                background: #fafafa;
                color: #111;
            }
            .container {
                max-width: 1100px;
                padding: 24px;
                margin: 0 auto;
            }
            .tabs {
                display: flex;
                gap: 4px;
                background: #fff;
                border-radius: 16px;
                padding: 4px;
                border: 1px solid #e8e8e8;
                margin-bottom: 24px;
            }
            .tab {
                flex: 1;
                padding: 12px;
                text-align: center;
                font-weight: 600;
                font-size: 14px;
                cursor: pointer;
                border-radius: 12px;
                border: none;
                background: none;
                color: #666;
                font-family: "Inter", sans-serif;
            }
            .tab.active {
                background: #45e3c6;
                color: #111;
            }
            .rank-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .rank-item {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 16px 20px;
                background: #fff;
                border-radius: 16px;
                border: 1px solid #e8e8e8;
            }
            .rank-item.top1 {
                border-color: #ffd700;
                background: linear-gradient(135deg, #fffde7, #fff8e1);
            }
            .rank-item.top2 {
                border-color: #c0c0c0;
                background: linear-gradient(135deg, #fafafa, #f5f5f5);
            }
            .rank-item.top3 {
                border-color: #cd7f32;
                background: linear-gradient(135deg, #fff3e0, #ffecb3);
            }
            .rank-num {
                width: 36px;
                height: 36px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 800;
                font-size: 16px;
                background: #fafafa;
            }
            .top1 .rank-num {
                background: #ffd700;
                color: #fff;
            }
            .top2 .rank-num {
                background: #c0c0c0;
                color: #fff;
            }
            .top3 .rank-num {
                background: #cd7f32;
                color: #fff;
            }
            .rank-avatar {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 16px;
                color: #fff;
                flex-shrink: 0;
            }
            .rank-name {
                font-weight: 600;
                font-size: 15px;
                flex: 1;
            }
            .rank-points {
                display: flex;
                gap: 20px;
                font-size: 14px;
            }
            .plus {
                color: #3bc4a8;
                font-weight: 700;
            }
            .minus {
                color: #f5576c;
                font-weight: 700;
            }
            .net {
                font-weight: 800;
                font-size: 16px;
                min-width: 50px;
                text-align: right;
            }
            .sticker-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 24px;
            }
            .sticker-btn {
                padding: 12px 18px;
                border-radius: 12px;
                border: 2px solid #e8e8e8;
                background: #fff;
                cursor: pointer;
                text-align: center;
                font-family: "Inter", sans-serif;
                min-width: 80px;
            }
            .sticker-btn:hover {
                transform: translateY(-2px);
            }
            .sticker-btn.reward {
                border-color: rgba(69, 227, 198, 0.3);
            }
            .sticker-btn.reward:hover {
                border-color: #45e3c6;
            }
            .sticker-btn.penalty {
                border-color: rgba(245, 87, 108, 0.3);
            }
            .sticker-btn.penalty:hover {
                border-color: #f5576c;
            }
            .sticker-btn .emoji {
                font-size: 28px;
                display: block;
                margin-bottom: 4px;
            }
            .sticker-btn .sname {
                font-size: 11px;
                font-weight: 600;
                color: #666;
            }
            .sticker-btn .spoint {
                font-size: 14px;
                font-weight: 800;
            }
            .member-list {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .member-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: #fff;
                border-radius: 8px;
                border: 1px solid #e8e8e8;
                cursor: pointer;
            }
            .member-item:hover {
                border-color: #45e3c6;
            }
            .member-item.selected {
                border-color: #45e3c6;
                background: rgba(69, 227, 198, 0.06);
            }
            .member-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 14px;
                color: #fff;
                flex-shrink: 0;
            }
            .member-info {
                flex: 1;
            }
            .member-name {
                font-weight: 600;
                font-size: 14px;
            }
            .member-email {
                font-size: 12px;
                color: #999;
            }
            .member-score {
                font-weight: 700;
                font-size: 16px;
            }
            .activity-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: #fff;
                border-radius: 8px;
                border: 1px solid #e8e8e8;
            }
            .activity-emoji {
                font-size: 20px;
                width: 32px;
                text-align: center;
            }
            .activity-info {
                flex: 1;
            }
            .atitle {
                font-size: 14px;
                font-weight: 600;
            }
            .atime {
                font-size: 12px;
                color: #999;
            }
            .activity-point {
                font-weight: 700;
                font-size: 15px;
            }
            .activity-point.plus {
                color: #3bc4a8;
            }
            .activity-point.minus {
                color: #f5576c;
            }
            .info-bar {
                display: flex;
                gap: 24px;
                flex-wrap: wrap;
                padding: 16px 20px;
                background: #fff;
                border: 1px solid #e8e8e8;
                border-radius: 16px;
                margin-bottom: 24px;
                font-size: 13px;
                color: #666;
            }
            .info-bar strong {
                color: #111;
            }
            .stats-row {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                margin-bottom: 20px;
            }
            .stat-card {
                background: #fff;
                border-radius: 16px;
                padding: 16px 20px;
                border: 1px solid #e8e8e8;
            }
            .stat-card .label {
                font-size: 12px;
                color: #999;
                text-transform: uppercase;
            }
            .stat-card .value {
                font-size: 28px;
                font-weight: 800;
                margin-top: 4px;
            }
            .value.green {
                color: #3bc4a8;
            }
            .value.red {
                color: #f5576c;
            }
            .section-title {
                font-size: 14px;
                font-weight: 700;
                margin-bottom: 12px;
                color: #666;
                text-transform: uppercase;
            }
            .empty {
                text-align: center;
                padding: 40px;
                color: #999;
            }
            .spinner {
                width: 24px;
                height: 24px;
                border: 3px solid #e8e8e8;
                border-top-color: #45e3c6;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                margin: 40px auto;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .toast {
                position: fixed;
                top: 64px;
                right: 24px;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 600;
                z-index: 300;
                animation: slideIn 0.3s ease;
            }
            .toast-success {
                background: rgba(69, 227, 198, 0.1);
                color: #3bc4a8;
                border: 1px solid rgba(69, 227, 198, 0.2);
            }
            .toast-error {
                background: rgba(245, 87, 108, 0.1);
                color: #f5576c;
                border: 1px solid rgba(245, 87, 108, 0.2);
            }
            @keyframes slideIn {
                from {
                    transform: translateX(100px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            .badge {
                padding: 3px 10px;
                border-radius: 12px;
                font-size: 11px;
                font-weight: 600;
            }
            .badge-green {
                background: rgba(69, 227, 198, 0.15);
                color: #3bc4a8;
            }
            .app-footer {
                padding: 10px 24px;
                border-top: 1px solid #e8e8e8;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 12px;
                color: #999;
                background: #fafafa;
            }
        </style>
    </head>
    <body>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="navbar-brand"
                    ><img src="assets/images/logo.svg" alt="ClassReward"
                /></a>
                <div class="nav-links">
                    <a href="/">Trang chủ</a><a href="/#features">Tính năng</a
                    ><a href="dashboard.html" class="active">Quản lý lớp học</a>
                </div>
                <div id="userInfo">
                    <div class="user-avatar" id="navAvatar">?</div>
                    <span class="user-name" id="navName"></span
                    ><button class="btn-sm" onclick="doLogout()">Thoát</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div
                style="
                    display: flex;
                    align-items: center;
                    gap: 12px;
                    margin-bottom: 20px;
                "
            >
                <a
                    href="dashboard.html"
                    style="font-size: 20px; color: #999; text-decoration: none"
                    >←</a
                >
                <h2
                    style="font-size: 22px; font-weight: 800; margin: 0"
                    id="classTitle"
                >
                    Đang tải...
                </h2>
                <span class="badge badge-green" id="classCode"></span>
            </div>
            <div id="loading"><div class="spinner"></div></div>
            <div id="content" style="display: none"></div>
        </div>
        <footer class="app-footer">
            <span>&copy; 2026 ClassReward.</span
            ><span>Tận tâm vì nhà giáo.</span>
        </footer>

        <script>
            const API = "/api",
                p = new URLSearchParams(location.search),
                classId = p.get("id");
            if (!classId) location.href = "dashboard.html";
            const token = localStorage.getItem("token"),
                user = JSON.parse(localStorage.getItem("user") || "{}"),
                isTeacher = user.role === "TEACHER" || user.role === "ADMIN";
            let classData = null,
                stickers = [],
                sel = null,
                tab = "ranking";
            !(function () {
                if (!token) {
                    location.href = "login.html";
                    return;
                }
                document.getElementById("navAvatar").textContent = user.fullName
                    .charAt(0)
                    .toUpperCase();
                document.getElementById("navName").textContent = user.fullName;
                load();
            })();
            async function load() {
                try {
                    const [e, t] = await Promise.all([
                            fetch(API + "/classes/" + classId, {
                                headers: { Authorization: "Bearer " + token },
                            }),
                            fetch(API + "/ranking/class/" + classId, {
                                headers: { Authorization: "Bearer " + token },
                            }),
                        ]),
                        a = await e.json(),
                        n = await t.json();
                    if (!a.success) throw 0;
                    classData = a.data;
                    stickers = [];
                    if (classData.stickerSets)
                        for (const e of classData.stickerSets)
                            if (e.stickerSet?.stickers)
                                stickers.push(...e.stickerSet.stickers);
                    document.getElementById("classTitle").textContent =
                        classData.className;
                    document.getElementById("classCode").textContent =
                        "Mã: " + classData.joinCode;
                    document.getElementById("loading").style.display = "none";
                    render(n.data);
                } catch (e) {
                    ((document.getElementById("loading").style.display =
                        "none"),
                        (document.getElementById("content").innerHTML =
                            '<div class="empty"><p>Lỗi tải dữ liệu.</p><a href="dashboard.html">← Quay lại</a></div>'));
                }
            }
            function render(e) {
                const t = document.getElementById("content");
                t.style.display = "block";
                let a = `<div class="info-bar"><span>👨‍🏫 <strong>${esc(classData.teacher?.fullName || "—")}</strong></span><span>👥 <strong>${classData.members?.length || 0} học sinh</strong></span><span>📅 <strong>${classData.schoolYear || "—"} - HK${classData.semester || "—"}</strong></span></div>`;
                a += `<div class="tabs"><button class="tab ${"ranking" === tab ? "active" : ""}" onclick="sw('ranking')">🏆 Bảng xếp hạng</button>`;
                isTeacher &&
                    (a += `<button class="tab ${"reward" === tab ? "active" : ""}" onclick="sw('reward')">⭐ Thưởng / Phạt</button>`);
                a += `<button class="tab ${"activity" === tab ? "active" : ""}" onclick="sw('activity')">📋 Hoạt động</button><button class="tab ${"members" === tab ? "active" : ""}" onclick="sw('members')">👥 Thành viên</button></div>`;
                "ranking" === tab
                    ? (a += rk(e))
                    : "reward" === tab
                      ? (a += rw())
                      : "members" === tab
                        ? (a += rm(e))
                        : "activity" === tab &&
                          (a +=
                              '<div id="al"><div class="spinner"></div></div>');
                t.innerHTML = a;
                "activity" === tab && la();
            }
            function rk(e) {
                const t = e?.ranking || [],
                    a = e?.summary || {};
                if (0 === t.length)
                    return '<div class="empty"><p>Chưa có dữ liệu.</p></div>';
                let n = `<div class="stats-row"><div class="stat-card"><div class="label">Tổng thưởng</div><div class="value green">+${a.totalRewardsGiven || 0}</div></div><div class="stat-card"><div class="label">Tổng phạt</div><div class="value red">-${a.totalPenaltiesGiven || 0}</div></div><div class="stat-card"><div class="label">Lượt thao tác</div><div class="value">${a.totalActions || 0}</div></div></div>`;
                n += '<div class="rank-list">';
                for (const e of t) {
                    const a =
                        1 === e.rank
                            ? "top1"
                            : 2 === e.rank
                              ? "top2"
                              : 3 === e.rank
                                ? "top3"
                                : "";
                    n += `<div class="rank-item ${a}"><div class="rank-num">${["", "🥇", "🥈", "🥉"][e.rank] || e.rank}</div><div class="rank-avatar" style="background:${rc(e.student.id)}">${e.student.fullName.charAt(0)}</div><div class="rank-name">${esc(e.student.fullName)}</div><div class="rank-points"><span class="plus">+${e.totalReward}</span><span class="minus">-${e.totalPenalty}</span><span class="net" style="color:${e.netPoints >= 0 ? "#3bc4a8" : "#f5576c"}">${e.netPoints >= 0 ? "+" : ""}${e.netPoints}</span></div></div>`;
                }
                return n + "</div>";
            }
            function rw() {
                if (0 === classData.members.length)
                    return '<div class="empty"><p>Chưa có học sinh.</p></div>';
                const e = stickers.filter((e) => "REWARD" === e.type),
                    t = stickers.filter((e) => "PENALTY" === e.type);
                let a = "";
                if (sel) {
                    a += `<div style="display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:8px;border:1px solid #45e3c6;margin-bottom:16px;"><div class="member-avatar" style="background:${rc(sel.id)}">${sel.fullName.charAt(0)}</div><div style="flex:1;"><strong>${esc(sel.fullName)}</strong></div><button style="color:#999;background:none;border:none;cursor:pointer;font-size:18px;" onclick="sel=null;sw('reward')">✕</button></div>`;
                } else
                    a +=
                        '<p style="color:#666;margin-bottom:12px;">Chọn học sinh bên dưới rồi chọn sticker.</p>';
                a +=
                    '<div class="section-title">Chọn học sinh</div><div class="member-list" style="margin-bottom:16px;max-height:200px;overflow-y:auto;">';
                for (const e of classData.members)
                    a += `<div class="member-item ${sel?.id === e.student.id ? "selected" : ""}" onclick="selStu(${e.student.id})"><div class="member-avatar" style="background:${rc(e.student.id)}">${e.student.fullName.charAt(0)}</div><div class="member-info"><div class="member-name">${esc(e.student.fullName)}</div></div></div>`;
                a += "</div>";
                if (0 === stickers.length)
                    return (
                        a + '<div class="empty"><p>Chưa có sticker.</p></div>'
                    );
                e.length > 0 &&
                    ((a +=
                        '<div class="section-title">⭐ Thưởng</div><div class="sticker-grid">'),
                    e.forEach((e) => {
                        a += `<button class="sticker-btn reward" onclick="give('${e.id}')"><span class="emoji">${e.emoji || "⭐"}</span><span class="sname">${esc(e.name)}</span><span class="spoint" style="color:#3bc4a8">+${e.point}</span></button>`;
                    }),
                    (a += "</div>"));
                t.length > 0 &&
                    ((a +=
                        '<div class="section-title">⚠️ Phạt</div><div class="sticker-grid">'),
                    t.forEach((e) => {
                        a += `<button class="sticker-btn penalty" onclick="give('${e.id}')"><span class="emoji">${e.emoji || "⚠️"}</span><span class="sname">${esc(e.name)}</span><span class="spoint" style="color:#f5576c">${e.point}</span></button>`;
                    }),
                    (a += "</div>"));
                return a;
            }
            function rm(e) {
                const t = e?.ranking || [],
                    a = {};
                t.forEach((e) => {
                    a[e.student.id] = e;
                });
                let n = '<div class="member-list">';
                for (const e of classData.members) {
                    const t = e.student,
                        r = a[t.id];
                    n += `<div class="member-item"><div class="member-avatar" style="background:${rc(t.id)}">${t.fullName.charAt(0)}</div><div class="member-info"><div class="member-name">${esc(t.fullName)}</div><div class="member-email">${esc(t.email)}</div></div><div class="member-score" style="color:${(r?.netPoints || 0) >= 0 ? "#3bc4a8" : "#f5576c"}">${r ? (r.netPoints >= 0 ? "+" : "") + r.netPoints : "0"}</div></div>`;
                }
                return n + "</div>";
            }
            async function la() {
                try {
                    const e = await fetch(
                            API + "/rewards/class/" + classId + "?limit=30",
                            { headers: { Authorization: "Bearer " + token } },
                        ),
                        t = await e.json(),
                        a = t.data?.logs || [];
                    let n =
                        '<div style="display:flex;flex-direction:column;gap:4px;">';
                    if (0 === a.length)
                        n +=
                            '<div class="empty"><p>Chưa có hoạt động.</p></div>';
                    else
                        for (const e of a)
                            n += `<div class="activity-item"><div class="activity-emoji">${e.sticker?.emoji || "📌"}</div><div class="activity-info"><div class="atitle">${esc(e.student?.fullName || "—")} — ${esc(e.sticker?.name || "—")}</div><div class="atime">${ta(e.createdAt)} · ${esc(e.teacher?.fullName || "—")}</div></div><div class="activity-point ${"REWARD" === e.sticker?.type ? "plus" : "minus"}">${"REWARD" === e.sticker?.type ? "+" : ""}${e.sticker?.point || 0}</div></div>`;
                    document.getElementById("al").innerHTML = n + "</div>";
                } catch (e) {
                    document.getElementById("al").innerHTML =
                        '<div class="empty">Lỗi</div>';
                }
            }
            function selStu(e) {
                const t = classData.members.find((t) => t.student.id == e);
                t && (sel = t.student);
                sw("reward");
            }
            async function give(e) {
                if (!sel) {
                    toast("Chọn học sinh trước", "error");
                    return;
                }
                try {
                    const t = await fetch(API + "/rewards", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                Authorization: "Bearer " + token,
                            },
                            body: JSON.stringify({
                                classId,
                                studentId: sel.id.toString(),
                                stickerId: e,
                            }),
                        }),
                        a = await t.json();
                    if (a.success) {
                        const e = stickers.find((t) => t.id == e);
                        toast(
                            `${e?.emoji || ""} ${e?.name || ""} → ${esc(sel.fullName)}`,
                            "success",
                        );
                        await load();
                    } else toast(a.message || "Lỗi", "error");
                } catch (e) {
                    toast("Lỗi kết nối", "error");
                }
            }
            function sw(e) {
                tab = e;
                "reward" !== e && (sel = null);
                load();
            }
            function esc(e) {
                const t = document.createElement("div");
                return ((t.textContent = e), t.innerHTML);
            }
            function rc(e) {
                const t = [
                    "#45E3C6",
                    "#667EEA",
                    "#F5576C",
                    "#FF9800",
                    "#4CAF50",
                    "#9C27B0",
                    "#00BCD4",
                    "#FF5722",
                    "#3F51B5",
                ];
                return t[Number(BigInt(e) % BigInt(t.length))] || t[0];
            }
            function ta(e) {
                const t = Date.now() - new Date(e).getTime(),
                    a = Math.floor(t / 6e4);
                if (a < 1) return "Vừa xong";
                if (a < 60) return a + " phút trước";
                const n = Math.floor(a / 60);
                return n < 24
                    ? n + " giờ trước"
                    : Math.floor(n / 24) + " ngày trước";
            }
            function toast(e, t) {
                const a = document.createElement("div");
                ((a.className = "toast toast-" + t),
                    (a.textContent = e),
                    document.body.appendChild(a),
                    setTimeout(() => a.remove(), 3e3));
            }
            function doLogout() {
                localStorage.clear();
                location.href = "login.html";
            }
        </script>
    </body>
</html>
