<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết lớp — ClassReward</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #fafafa; --text: #111; --text2: #666; --text3: #999;
            --accent: #45e3c6; --accent2: #3bc4a8; --white: #fff; --border: #e8e8e8;
            --red: #f5576c; --orange: #FF9800; --blue: #667eea; --gold: #FFD700;
            --radius: 16px; --radius-sm: 8px;
            --shadow: 0 24px 64px rgba(0,0,0,0.08);
            --font: "Inter", sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; }

        .navbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
        .navbar .back { font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-sm); }
        .navbar .back:hover { background: var(--bg); }
        .navbar .title { font-size: 18px; font-weight: 700; flex: 1; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-green { background: rgba(69,227,198,0.15); color: var(--accent2); }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

        .tabs { display: flex; gap: 4px; background: var(--white); border-radius: var(--radius); padding: 4px; border: 1px solid var(--border); margin-bottom: 24px; }
        .tab { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 14px; cursor: pointer; border-radius: 12px; transition: all 0.2s; color: var(--text2); border: none; background: none; font-family: var(--font); }
        .tab.active { background: var(--accent); color: var(--text); }
        .tab:hover:not(.active) { color: var(--text); }

        /* Ranking */
        .rank-list { display: flex; flex-direction: column; gap: 8px; }
        .rank-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); }
        .rank-item.top1 { border-color: var(--gold); background: linear-gradient(135deg, #FFFDE7, #FFF8E1); }
        .rank-item.top2 { border-color: #C0C0C0; background: linear-gradient(135deg, #FAFAFA, #F5F5F5); }
        .rank-item.top3 { border-color: #CD7F32; background: linear-gradient(135deg, #FFF3E0, #FFECB3); }
        .rank-num { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; background: var(--bg); }
        .rank-item.top1 .rank-num { background: var(--gold); color: #fff; }
        .rank-item.top2 .rank-num { background: #C0C0C0; color: #fff; }
        .rank-item.top3 .rank-num { background: #CD7F32; color: #fff; }
        .rank-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: var(--white); flex-shrink: 0; }
        .rank-name { font-weight: 600; font-size: 15px; flex: 1; }
        .rank-points { display: flex; gap: 20px; font-size: 14px; }
        .rank-points .plus { color: var(--accent2); font-weight: 700; }
        .rank-points .minus { color: var(--red); font-weight: 700; }
        .rank-points .net { font-weight: 800; font-size: 16px; min-width: 50px; text-align: right; }

        /* Stickers */
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.03em; }
        .sticker-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .sticker-btn { padding: 12px 18px; border-radius: 12px; border: 2px solid var(--border); background: var(--white); cursor: pointer; text-align: center; font-family: var(--font); transition: all 0.2s; min-width: 80px; }
        .sticker-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .sticker-btn:active { transform: scale(0.95); }
        .sticker-btn .emoji { font-size: 28px; display: block; margin-bottom: 4px; }
        .sticker-btn .sname { font-size: 11px; font-weight: 600; color: var(--text2); }
        .sticker-btn .spoint { font-size: 14px; font-weight: 800; }
        .sticker-btn.reward { border-color: rgba(69,227,198,0.3); }
        .sticker-btn.reward:hover { border-color: var(--accent); background: rgba(69,227,198,0.05); }
        .sticker-btn.penalty { border-color: rgba(245,87,108,0.3); }
        .sticker-btn.penalty:hover { border-color: var(--red); background: rgba(245,87,108,0.05); }

        /* Members */
        .member-list { display: flex; flex-direction: column; gap: 4px; }
        .member-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--white); border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
        .member-item:hover { border-color: var(--accent); }
        .member-item.selected { border-color: var(--accent); background: rgba(69,227,198,0.06); box-shadow: 0 0 0 3px rgba(69,227,198,0.15); }
        .member-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
        .member-info { flex: 1; }
        .member-name { font-weight: 600; font-size: 14px; }
        .member-email { font-size: 12px; color: var(--text3); }
        .member-score { font-weight: 700; font-size: 16px; }

        /* Activity */
        .activity-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--white); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .activity-emoji { font-size: 20px; width: 32px; text-align: center; }
        .activity-info { flex: 1; }
        .activity-info .atitle { font-size: 14px; font-weight: 600; }
        .activity-info .atime { font-size: 12px; color: var(--text3); }
        .activity-point { font-weight: 700; font-size: 15px; }
        .activity-point.plus { color: var(--accent2); }
        .activity-point.minus { color: var(--red); }

        /* Info bar */
        .info-bar { display: flex; gap: 24px; flex-wrap: wrap; padding: 16px 20px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 24px; font-size: 13px; color: var(--text2); }
        .info-bar strong { color: var(--text); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; display: none; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--white); border-radius: var(--radius); padding: 28px; width: 90%; max-width: 400px; }
        .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .modal .confirm-text { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; cursor: pointer; border: none; font-family: var(--font); }
        .btn-accent { background: var(--accent); color: var(--text); }
        .btn-outline { background: none; border: 2px solid var(--border); color: var(--text2); }
        .btn-danger { background: var(--red); color: #fff; }

        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast { position: fixed; top: 80px; right: 24px; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; z-index: 300; animation: slideIn 0.3s ease; }
        .toast-success { background: rgba(69,227,198,0.1); color: var(--accent2); border: 1px solid rgba(69,227,198,0.2); }
        .toast-error { background: rgba(245,87,108,0.1); color: var(--red); border: 1px solid rgba(245,87,108,0.2); }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .empty { text-align: center; padding: 40px; color: var(--text3); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="back">←</a>
        <span class="title" id="classTitle">Đang tải...</span>
        <span class="badge badge-green" id="classCode"></span>
    </nav>

    <div class="container">
        <div id="loading"><div class="spinner"></div></div>
        <div id="content" style="display:none;"></div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3 id="confirmTitle">Xác nhận</h3>
            <p class="confirm-text" id="confirmText"></p>
            <div style="display:flex; gap:8px; justify-content:flex-end;">
                <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
                <button class="btn btn-accent" id="confirmBtn">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('id');

        if (!classId) { window.location.href = 'dashboard.html'; }

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const isTeacher = user.role === 'TEACHER' || user.role === 'ADMIN';

        let classData = null;
        let stickers = [];
        let selectedStudent = null;
        let activeTab = 'ranking';

        (async function init() {
            if (!token) { window.location.href = 'login.html'; return; }
            await loadClassData();
        })();

        async function loadClassData() {
            try {
                const [classRes, stickerRes] = await Promise.all([
                    fetch(API + '/classes/' + classId, { headers: { 'Authorization': 'Bearer ' + token } }),
                    fetch(API + '/ranking/class/' + classId, { headers: { 'Authorization': 'Bearer ' + token } })
                ]);

                const classJson = await classRes.json();
                const rankJson = await stickerRes.json();

                if (!classJson.success) throw new Error('Không tìm thấy lớp');
                classData = classJson.data;

                // Extract stickers from class sticker sets
                stickers = [];
                if (classData.stickerSets) {
                    for (const mapping of classData.stickerSets) {
                        if (mapping.stickerSet?.stickers) {
                            stickers.push(...mapping.stickerSet.stickers);
                        }
                    }
                }

                document.getElementById('classTitle').textContent = classData.className;
                document.getElementById('classCode').textContent = 'Mã: ' + classData.joinCode;
                document.getElementById('loading').style.display = 'none';

                render(rankJson.data);
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').innerHTML = '<div class="empty"><p>Không thể tải dữ liệu lớp.</p><a href="dashboard.html">← Quay lại</a></div>';
            }
        }

        function render(rankData) {
            const content = document.getElementById('content');
            content.style.display = 'block';

            // Info bar
            let html = `<div class="info-bar">
                <span>👨‍🏫 <strong>${esc(classData.teacher?.fullName || '—')}</strong></span>
                <span>👥 <strong>${classData.members?.length || 0} học sinh</strong></span>
                <span>📅 <strong>${classData.schoolYear || '—'} - HK${classData.semester || '—'}</strong></span>
                <span>🟢 <strong>${classData.status === 'ACTIVE' ? 'Đang hoạt động' : 'Đã lưu trữ'}</strong></span>
            </div>`;

            // Tabs
            html += `<div class="tabs">
                <button class="tab ${activeTab === 'ranking' ? 'active' : ''}" onclick="switchTab('ranking')">🏆 Bảng xếp hạng</button>`;
            if (isTeacher) {
                html += `<button class="tab ${activeTab === 'reward' ? 'active' : ''}" onclick="switchTab('reward')">⭐ Thưởng / Phạt</button>`;
            }
            html += `<button class="tab ${activeTab === 'activity' ? 'active' : ''}" onclick="switchTab('activity')">📋 Hoạt động</button>
                <button class="tab ${activeTab === 'members' ? 'active' : ''}" onclick="switchTab('members')">👥 Thành viên</button>
            </div>`;

            // Tab content
            if (activeTab === 'ranking') {
                html += renderRanking(rankData);
            } else if (activeTab === 'reward') {
                html += renderReward();
            } else if (activeTab === 'members') {
                html += renderMembers(rankData);
            } else if (activeTab === 'activity') {
                html += '<div id="activityList"><div class="spinner"></div></div>';
            }

            content.innerHTML = html;

            if (activeTab === 'activity') loadActivity();
        }

        function renderRanking(rankData) {
            const ranking = rankData?.ranking || [];
            const summary = rankData?.summary || {};
            let html = '';

            if (ranking.length === 0) {
                return '<div class="empty"><p>Chưa có dữ liệu xếp hạng.</p></div>';
            }

            html += `<div class="stats-row" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px;">
                <div class="stat-card"><div class="label">Tổng thưởng</div><div class="value green">+${summary.totalRewardsGiven || 0}</div></div>
                <div class="stat-card"><div class="label">Tổng phạt</div><div class="value red">-${summary.totalPenaltiesGiven || 0}</div></div>
                <div class="stat-card"><div class="label">Lượt thao tác</div><div class="value">${summary.totalActions || 0}</div></div>
            </div>`;

            html += '<div class="rank-list">';
            for (const r of ranking) {
                const topClass = r.rank === 1 ? 'top1' : r.rank === 2 ? 'top2' : r.rank === 3 ? 'top3' : '';
                html += `<div class="rank-item ${topClass}">
                    <div class="rank-num">${['','🥇','🥈','🥉'][r.rank] || r.rank}</div>
                    <div class="rank-avatar" style="background:${randomColor(r.student.id)}">${r.student.fullName.charAt(0)}</div>
                    <div class="rank-name">${esc(r.student.fullName)}</div>
                    <div class="rank-points">
                        <span class="plus">+${r.totalReward}</span>
                        <span class="minus">-${r.totalPenalty}</span>
                        <span class="net" style="color:${r.netPoints >= 0 ? 'var(--accent2)' : 'var(--red)'}">${r.netPoints >= 0 ? '+' : ''}${r.netPoints}</span>
                    </div>
                </div>`;
            }
            html += '</div>';
            return html;
        }

        function renderReward() {
            if (classData.members.length === 0) {
                return '<div class="empty"><p>Chưa có học sinh trong lớp.</p></div>';
            }

            // Group stickers
            const rewards = stickers.filter(s => s.type === 'REWARD');
            const penalties = stickers.filter(s => s.type === 'PENALTY');

            let html = '';

            // Selected student
            if (selectedStudent) {
                const s = selectedStudent;
                html += `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-radius:var(--radius-sm);border:1px solid var(--accent);margin-bottom:16px;">
                    <div class="member-avatar" style="background:${randomColor(s.id)}">${s.fullName.charAt(0)}</div>
                    <div style="flex:1;"><strong>${esc(s.fullName)}</strong><br><span style="font-size:12px;color:var(--text3);">${esc(s.email)}</span></div>
                    <button style="color:var(--text3);background:none;border:none;cursor:pointer;font-size:18px;" onclick="selectedStudent=null;switchTab('reward')">✕</button>
                </div>`;
            } else {
                html += '<p style="color:var(--text2);margin-bottom:12px;">Chọn học sinh bên dưới, sau đó chọn sticker để thưởng/phạt.</p>';
            }

            // Members list
            html += '<div class="section-title">Chọn học sinh</div>';
            html += '<div class="member-list" style="margin-bottom:16px; max-height:200px; overflow-y:auto;">';
            for (const m of classData.members) {
                const s = m.student;
                html += `<div class="member-item ${selectedStudent?.id === s.id ? 'selected' : ''}" onclick="selectStudent(${s.id})">
                    <div class="member-avatar" style="background:${randomColor(s.id)}">${s.fullName.charAt(0)}</div>
                    <div class="member-info"><div class="member-name">${esc(s.fullName)}</div></div>
                </div>`;
            }
            html += '</div>';

            if (stickers.length === 0) {
                html += '<div class="empty"><p>Chưa có bộ sticker nào được gán vào lớp này.</p></div>';
            } else {
                if (rewards.length > 0) {
                    html += '<div class="section-title">⭐ Thưởng</div><div class="sticker-grid">';
                    for (const s of rewards) {
                        html += `<button class="sticker-btn reward" onclick="giveSticker('${s.id}')">
                            <span class="emoji">${s.emoji || '⭐'}</span>
                            <span class="sname">${esc(s.name)}</span>
                            <span class="spoint" style="color:var(--accent2);">+${s.point}</span>
                        </button>`;
                    }
                    html += '</div>';
                }
                if (penalties.length > 0) {
                    html += '<div class="section-title">⚠️ Phạt</div><div class="sticker-grid">';
                    for (const s of penalties) {
                        html += `<button class="sticker-btn penalty" onclick="giveSticker('${s.id}')">
                            <span class="emoji">${s.emoji || '⚠️'}</span>
                            <span class="sname">${esc(s.name)}</span>
                            <span class="spoint" style="color:var(--red);">${s.point}</span>
                        </button>`;
                    }
                    html += '</div>';
                }
            }
            return html;
        }

        function renderMembers(rankData) {
            const ranking = rankData?.ranking || [];
            const rankMap = {};
            ranking.forEach(r => { rankMap[r.student.id] = r; });

            let html = '<div class="member-list">';
            for (const m of classData.members) {
                const s = m.student;
                const r = rankMap[s.id];
                html += `<div class="member-item">
                    <div class="member-avatar" style="background:${randomColor(s.id)}">${s.fullName.charAt(0)}</div>
                    <div class="member-info"><div class="member-name">${esc(s.fullName)}</div><div class="member-email">${esc(s.email)}</div></div>
                    <div class="member-score" style="color:${(r?.netPoints || 0) >= 0 ? 'var(--accent2)' : 'var(--red)'}">${r ? (r.netPoints >= 0 ? '+' : '') + r.netPoints : '0'}</div>
                </div>`;
            }
            html += '</div>';
            return html;
        }

        async function loadActivity() {
            try {
                const res = await fetch(API + '/rewards/class/' + classId + '?limit=30', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const logs = data.data?.logs || [];
                let html = '<div class="activity-list" style="display:flex;flex-direction:column;gap:4px;">';
                if (logs.length === 0) {
                    html += '<div class="empty"><p>Chưa có hoạt động nào.</p></div>';
                } else {
                    for (const l of logs) {
                        html += `<div class="activity-item">
                            <div class="activity-emoji">${l.sticker?.emoji || '📌'}</div>
                            <div class="activity-info">
                                <div class="atitle">${esc(l.student?.fullName || '—')} — ${esc(l.sticker?.name || '—')}</div>
                                <div class="atime">${timeAgo(l.createdAt)} · bởi ${esc(l.teacher?.fullName || '—')}</div>
                            </div>
                            <div class="activity-point ${l.sticker?.type === 'REWARD' ? 'plus' : 'minus'}">${l.sticker?.type === 'REWARD' ? '+' : ''}${l.sticker?.point || 0}</div>
                        </div>`;
                    }
                }
                html += '</div>';
                document.getElementById('activityList').innerHTML = html;
            } catch (e) {
                document.getElementById('activityList').innerHTML = '<div class="empty">Lỗi tải dữ liệu</div>';
            }
        }

        function selectStudent(id) {
            const m = classData.members.find(m => m.student.id == id);
            if (m) selectedStudent = m.student;
            switchTab('reward');
        }

        async function giveSticker(stickerId) {
            if (!selectedStudent) {
                toast('Vui lòng chọn học sinh trước', 'error');
                return;
            }
            try {
                const res = await fetch(API + '/rewards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ classId: classId, studentId: selectedStudent.id.toString(), stickerId })
                });
                const data = await res.json();
                if (data.success) {
                    const sticker = stickers.find(s => s.id == stickerId);
                    toast(`${sticker?.emoji || ''} ${sticker?.name || ''} → ${esc(selectedStudent.fullName)}`, 'success');
                    await loadClassData();
                } else {
                    toast(data.message || 'Lỗi', 'error');
                }
            } catch (e) {
                toast('Lỗi kết nối', 'error');
            }
        }

        function switchTab(tab) {
            activeTab = tab;
            if (tab !== 'reward') selectedStudent = null;
            loadClassData();
        }

        function closeModal() { document.getElementById('confirmModal').classList.remove('show'); }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function randomColor(id) {
            const colors = ['#45E3C6','#667EEA','#F5576C','#FF9800','#4CAF50','#9C27B0','#00BCD4','#FF5722','#3F51B5'];
            return colors[Number(BigInt(id) % BigInt(colors.length))] || colors[0];
        }

        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'Vừa xong';
            if (mins < 60) return mins + ' phút trước';
            const hours = Math.floor(mins / 60);
            if (hours < 24) return hours + ' giờ trước';
            return Math.floor(hours / 24) + ' ngày trước';
        }

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    </script>
</body>
</html>
